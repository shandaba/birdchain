<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>结算 - 创作周边 - BirdChain鸟链</title>
  <meta name="description" content="完成你的BirdChain创作周边订单结算。">
  <meta property="og:title" content="结算 - BirdChain鸟链">
  <meta property="og:description" content="完成订单结算。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 400px; gap: 32px; margin-bottom: 40px; }
    .checkout-form { background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: var(--radius-lg); padding: 28px; }
    .checkout-form h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
    .checkout-form-group { margin-bottom: 18px; }
    .checkout-form-group label { display: block; font-size: 0.88rem; font-weight: 500; color: var(--text-main); margin-bottom: 6px; }
    .checkout-form-group input, .checkout-form-group textarea {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--line-soft); background: var(--bg-card); color: var(--text-main);
      font-size: 0.9rem; outline: none; transition: border-color var(--transition-fast);
    }
    .checkout-form-group input:focus, .checkout-form-group textarea:focus { border-color: var(--brand-accent); }
    .checkout-form-group textarea { min-height: 80px; resize: vertical; }
    .checkout-form-group .error-msg { font-size: 0.78rem; color: var(--danger); margin-top: 4px; display: none; }
    .checkout-form-group.error input, .checkout-form-group.error textarea { border-color: var(--danger); }
    .checkout-form-group.error .error-msg { display: block; }
    .checkout-summary { position: sticky; top: calc(var(--header-height) + 20px); }
    .checkout-summary-card { background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: var(--radius-lg); padding: 24px; }
    .checkout-summary-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line-soft); }
    .checkout-summary-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; color: var(--text-secondary); }
    .checkout-summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.88rem; }
    .checkout-summary-row.total { font-weight: 700; font-size: 1.1rem; padding-top: 14px; border-top: 1px solid var(--line-soft); margin-top: 8px; color: var(--brand-accent-dark); }
    .checkout-submit-btn { width: 100%; margin-top: 20px; padding: 14px; border-radius: var(--radius-md); background: var(--brand-accent); color: #fff; font-size: 1rem; font-weight: 600; text-align: center; cursor: pointer; transition: all var(--transition-fast); border: none; }
    .checkout-submit-btn:hover { background: var(--brand-accent-dark); }
    .checkout-success { text-align: center; padding: 60px 20px; display: none; }
    .checkout-success.visible { display: block; }
    .checkout-success-icon { font-size: 4rem; margin-bottom: 16px; }
    .checkout-success h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .checkout-success p { color: var(--text-secondary); margin-bottom: 20px; }
    .checkout-success .order-id { font-family: monospace; font-size: 0.9rem; background: var(--bg-soft); padding: 8px 16px; border-radius: var(--radius-sm); display: inline-block; }
    @media (max-width:1024px) { .checkout-layout { grid-template-columns: 1fr; } .checkout-summary { position: static; } }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div class="bc-breadcrumb">
        <a href="/">首页</a><span class="sep">/</span><a href="/merch/index.html">创作周边</a><span class="sep">/</span><span class="current">结算</span>
      </div>
      <h1 class="section-title">结算</h1>
      <div id="checkoutContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var app = document.getElementById('app');
      app.insertAdjacentHTML('afterbegin', BirdChainComponents.renderHeader('merch'));
      app.insertAdjacentHTML('beforeend', BirdChainComponents.renderFooter());
      BirdChainInteractions.initAll();

      var BC = window.BirdChainStorage;
      var container = document.getElementById('checkoutContent');
      var FREE_SHIPPING_THRESHOLD = 299;

      var cart = BC.getItem(BC.KEYS.cartItems, []);
      if (cart.length === 0) {
        container.innerHTML =
          '<div class="bc-empty"><div class="bc-empty-icon">🛒</div><h4>购物车为空</h4><p style="color:var(--text-secondary);margin-top:8px;">请先添加商品到购物车</p><a href="/merch/index.html" class="btn btn-accent mt-3">去选购</a></div>';
        return;
      }

      var subtotal = cart.reduce(function(sum, item) { return sum + (item.price || 0) * (item.quantity || 1); }, 0);
      var shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : 15;
      var total = subtotal + shipping;

      var itemsList = '';
      cart.forEach(function(item) {
        itemsList += '<div class="checkout-summary-item"><span>' + (item.name||'') + ' x' + (item.quantity||1) + '</span><span>' + (typeof formatPrice !== 'undefined' ? formatPrice((item.price||0)*(item.quantity||1)) : '¥' + ((item.price||0)*(item.quantity||1)).toFixed(2)) + '</span></div>';
      });

      container.innerHTML =
        '<div class="checkout-layout" id="checkoutLayout">' +
        '<div class="checkout-form" id="checkoutForm">' +
        '<h3>收货信息</h3>' +
        '<div class="checkout-form-group"><label>收件人姓名 *</label><input type="text" id="inputName" placeholder="请输入收件人姓名"></div>' +
        '<div class="checkout-form-group"><label>手机号码 *</label><input type="tel" id="inputPhone" placeholder="请输入手机号码"></div>' +
        '<div class="checkout-form-group"><label>收货地址 *</label><input type="text" id="inputAddress" placeholder="请输入详细收货地址"></div>' +
        '<div class="checkout-form-group"><label>备注</label><textarea id="inputNotes" placeholder="如有特殊要求请在此备注（选填）"></textarea></div>' +
        '<button class="checkout-submit-btn" id="submitBtn">模拟下单</button>' +
        '</div>' +
        '<div class="checkout-summary">' +
        '<div class="checkout-summary-card">' +
        '<h4>订单摘要</h4>' +
        itemsList +
        '<div class="checkout-summary-row"><span>商品小计</span><span>' + (typeof formatPrice !== 'undefined' ? formatPrice(subtotal) : '¥' + subtotal.toFixed(2)) + '</span></div>' +
        '<div class="checkout-summary-row"><span>运费</span><span style="color:var(--success);">' + (shipping === 0 ? '免运费' : (typeof formatPrice !== 'undefined' ? formatPrice(shipping) : '¥' + shipping.toFixed(2))) + '</span></div>' +
        '<div class="checkout-summary-row total"><span>合计</span><span>' + (typeof formatPrice !== 'undefined' ? formatPrice(total) : '¥' + total.toFixed(2)) + '</span></div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '<div class="checkout-success" id="successArea">' +
        '<div class="checkout-success-icon">🎉</div>' +
        '<h3>下单成功！</h3>' +
        '<p>感谢你的购买，你的订单已成功提交。</p>' +
        '<div class="order-id" id="orderIdDisplay"></div>' +
        '<p style="margin-top:16px;font-size:0.85rem;color:var(--text-secondary);">我们将尽快处理你的订单，如有疑问请联系客服。</p>' +
        '<a href="/merch/index.html" class="btn btn-accent mt-3">继续购物</a>' +
        '</div>';

      document.getElementById('submitBtn').addEventListener('click', function() {
        var name = document.getElementById('inputName').value.trim();
        var phone = document.getElementById('inputPhone').value.trim();
        var address = document.getElementById('inputAddress').value.trim();
        var notes = document.getElementById('inputNotes').value.trim();

        var valid = true;

        var nameGroup = document.getElementById('inputName').closest('.checkout-form-group');
        var phoneGroup = document.getElementById('inputPhone').closest('.checkout-form-group');
        var addressGroup = document.getElementById('inputAddress').closest('.checkout-form-group');

        [nameGroup, phoneGroup, addressGroup].forEach(function(g) { g.classList.remove('error'); });

        if (!name) { nameGroup.classList.add('error'); valid = false; }
        if (!phone) { phoneGroup.classList.add('error'); valid = false; }
        if (!address) { addressGroup.classList.add('error'); valid = false; }

        if (!valid) {
          BirdChainInteractions.showToast('请填写所有必填字段', 'warning');
          return;
        }

        var orderId = 'BC-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
        var order = {
          id: orderId,
          name: name,
          phone: phone,
          address: address,
          notes: notes,
          items: cart,
          subtotal: subtotal,
          shipping: shipping,
          total: total,
          timestamp: Date.now()
        };

        var orders = BC.getItem(BC.KEYS.merchOrders, []);
        orders.unshift(order);
        BC.setItem(BC.KEYS.merchOrders, orders);
        BC.setItem(BC.KEYS.cartItems, []);
        BirdChainInteractions.updateCartBadge();

        document.getElementById('checkoutLayout').style.display = 'none';
        document.getElementById('successArea').classList.add('visible');
        document.getElementById('orderIdDisplay').textContent = '订单编号：' + orderId;

        BirdChainInteractions.showToast('下单成功！订单编号: ' + orderId, 'success');
      });
    });
  </script>
</body>
</html>
