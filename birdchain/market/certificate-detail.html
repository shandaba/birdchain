<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权证书 - BirdChain鸟链</title>
  <meta name="description" content="BirdChain区块链版权授权证书，验证作品授权信息的真实性与完整性。">
  <meta property="og:title" content="授权证书 - BirdChain鸟链">
  <meta property="og:description" content="BirdChain区块链版权授权证书">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-certificate {
      max-width: 800px;
      margin: 40px auto;
      background: var(--bg-card);
      border: 2px solid var(--brand-accent);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .bc-certificate::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--brand-accent), var(--brand-primary), var(--brand-accent));
    }
    .bc-certificate-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-size: 8rem;
      font-weight: 900;
      color: var(--bg-soft);
      opacity: 0.3;
      pointer-events: none;
      white-space: nowrap;
      user-select: none;
    }
    .bc-cert-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }
    .bc-cert-header .bc-logo-icon {
      margin: 0 auto 12px;
    }
    .bc-cert-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-strong);
      margin-bottom: 4px;
    }
    .bc-cert-header p {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .bc-cert-badge-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 20px 0 32px;
      flex-wrap: wrap;
    }
    .bc-cert-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 0.82rem;
      font-weight: 600;
      background: rgba(47, 125, 81, 0.1);
      color: var(--success);
    }
    .bc-cert-badge svg {
      color: var(--success);
    }
    .bc-cert-id {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brand-accent-dark);
      padding: 12px 24px;
      background: var(--brand-accent-soft);
      border-radius: var(--radius-sm);
      display: inline-block;
      margin: 0 auto 32px;
      letter-spacing: 1px;
    }
    .bc-cert-id-wrapper {
      text-align: center;
      margin-bottom: 32px;
    }
    .bc-cert-table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      position: relative;
    }
    .bc-cert-table td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--line-soft);
    }
    .bc-cert-table td:first-child {
      color: var(--text-secondary);
      font-weight: 500;
      width: 180px;
    }
    .bc-cert-table td:last-child {
      color: var(--text-strong);
      font-weight: 500;
    }
    .bc-cert-hash {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: var(--text-secondary);
      word-break: break-all;
      background: var(--bg-soft);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .bc-cert-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line-soft);
      font-size: 0.82rem;
      color: var(--text-secondary);
      position: relative;
    }
    .bc-cert-footer p {
      margin: 4px 0;
    }
    .bc-cert-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .bc-cert-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .bc-cert-not-found svg {
      margin-bottom: 16px;
      opacity: 0.4;
    }
    @media print {
      body { background: #fff; }
      .bc-header, .bc-footer, .bc-cert-actions, .bc-toast-container { display: none !important; }
      .bc-certificate { border: 2px solid #C7A56D; box-shadow: none; max-width: 100%; margin: 0; }
      .container { max-width: 100%; padding: 0; }
      .bc-breadcrumb { display: none; }
    }
    @media (max-width: 767px) {
      .bc-certificate { padding: 32px 20px; margin: 20px 0; }
      .bc-cert-header h1 { font-size: 1.3rem; }
      .bc-cert-table td:first-child { width: 100px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="certContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BD = window.BirdChainData;
      var BI = window.BirdChainInteractions;
      var BS = window.BirdChainStorage;
      var BP = window.BirdChainPricing;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('market'));
      app.insertAdjacentHTML('beforeend', BC.renderFooter());

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '版权市场', href: '/market/index.html' },
        { label: '授权证书' }
      ]);

      var params = new URLSearchParams(window.location.search);
      var orderId = params.get('id');

      var orders = BS.getItem(BS.KEYS.licenseOrders, []);
      var order;

      if (orderId) {
        order = orders.find(function(o) { return o.id === orderId; });
      }

      if (!order) {
        order = orders[orders.length - 1];
      }

      var certContainer = document.getElementById('certContent');

      if (!order) {
        certContainer.innerHTML = '<div class="bc-cert-not-found">' +
          '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>' +
          '<h4>暂无授权证书</h4>' +
          '<p class="text-sm text-secondary">完成授权支付后将在此查看证书</p>' +
          '<a href="/market/index.html" class="btn btn-accent mt-3">前往版权市场</a>' +
          '</div>';
        BI.initThemeToggle();
        BI.initMobileMenu();
        BI.initSearchBar();
        return;
      }

      var createdAt = new Date(order.createdAt);
      var dateStr = createdAt.getFullYear() + '年' + (createdAt.getMonth() + 1) + '月' + createdAt.getDate() + '日 ' +
                    String(createdAt.getHours()).padStart(2, '0') + ':' + String(createdAt.getMinutes()).padStart(2, '0') + ':' + String(createdAt.getSeconds()).padStart(2, '0');

      var creators = await BD.loadData('creators');
      var creatorMap = {};
      creators.forEach(function(c) { creatorMap[c.id] = c; });

      var html = '<div class="bc-certificate">';
      html += '<div class="bc-certificate-watermark">BIRDCHAIN</div>';

      html += '<div class="bc-cert-header">';
      html += '<div class="bc-logo-icon">' + LOGO_SVG + '</div>';
      html += '<h1>BirdChain 版权授权证书</h1>';
      html += '<p>区块链存证 · 不可篡改 · 永久可验证</p>';
      html += '</div>';

      html += '<div class="bc-cert-badge-row">';
      html += '<span class="bc-cert-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已存证</span>';
      html += '<span class="bc-cert-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 可验证</span>';
      html += '<span class="bc-cert-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 未篡改</span>';
      html += '</div>';

      html += '<div class="bc-cert-id-wrapper">';
      html += '<span class="bc-cert-id">' + esc(order.certificateId) + '</span>';
      html += '</div>';

      html += '<table class="bc-cert-table">';
      html += '<tr><td>授权证书编号</td><td>' + esc(order.certificateId) + '</td></tr>';
      html += '<tr><td>作品哈希</td><td><span class="bc-cert-hash">' + esc(order.hash) + '</span></td></tr>';

      if (order.items && order.items.length > 0) {
        order.items.forEach(function(item, i) {
          var creator = creatorMap[item.creatorId] || {};
          html += '<tr><td>授权作品 #' + (i + 1) + '</td><td>' + esc(item.name) + '</td></tr>';
          if (item.certificateId) html += '<tr><td>原作品证书</td><td>' + esc(item.certificateId) + '</td></tr>';
        });

        var item = order.items[0];
        html += '<tr><td>授权用途</td><td>' + esc(item.licenseUsage || '—') + '</td></tr>';
        html += '<tr><td>授权区域</td><td>' + esc(item.licenseRegion || '—') + '</td></tr>';
        html += '<tr><td>授权期限</td><td>' + esc(item.licenseDuration || '—') + '</td></tr>';
        html += '<tr><td>允许AI二创</td><td>' + (item.licenseAllowAI ? '是' : '否') + '</td></tr>';
        html += '<tr><td>允许商品化</td><td>' + (item.licenseAllowMerch ? '是' : '否') + '</td></tr>';
      }

      html += '<tr><td>购买方</td><td>BirdChain用户</td></tr>';
      html += '<tr><td>生成时间</td><td>' + dateStr + '</td></tr>';
      html += '<tr><td>订单编号</td><td>' + esc(order.id) + '</td></tr>';
      html += '</table>';

      html += '<div class="bc-cert-footer">';
      html += '<p>本证书由BirdChain区块链平台生成，所有授权信息已上链存证。</p>';
      html += '<p>通过区块链技术确保授权记录的不可篡改性和永久可验证性。</p>';
      html += '<p style="margin-top:8px;font-weight:600;">BirdChain - 保护每一份创作的权益</p>';
      html += '</div>';

      html += '</div>';

      html += '<div class="bc-cert-actions">';
      html += '<button class="btn btn-primary" onclick="window.print()">打印证书</button>';
      html += '<a href="/market/license-checkout.html" class="btn btn-outline">返回结算</a>';
      html += '</div>';

      certContainer.innerHTML = html;

      BI.initThemeToggle();
      BI.initMobileMenu();
      BI.initSearchBar();
      BI.initNewsletterForm();
      BI.updateCartBadge();
    });
  </script>
</body>
</html>
