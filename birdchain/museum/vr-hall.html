<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR展厅 - BirdChain鸟链</title>
  <meta name="description" content="进入BirdChain VR鸟类展厅，沉浸式体验虚拟鸟类博物馆，360度探索数字展项。">
  <meta property="og:title" content="VR展厅 - BirdChain鸟链">
  <meta property="og:description" content="进入虚拟鸟类博物馆，沉浸式探索数字展项。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .vr-hall-container {
      margin: 20px 0 40px;
      perspective: 1200px;
    }
    .vr-hall-stage {
      background: linear-gradient(180deg, #071B2D 0%, #0F2E4A 30%, #16395C 100%);
      border-radius: var(--radius-lg);
      padding: 60px 40px;
      position: relative;
      overflow: hidden;
      min-height: 500px;
    }
    .vr-hall-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(199, 165, 109, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(45, 106, 79, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(7, 27, 45, 0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .vr-hall-title {
      text-align: center;
      position: relative;
      z-index: 1;
      margin-bottom: 48px;
    }
    .vr-hall-title h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .vr-hall-title p {
      color: rgba(255,255,255,0.65);
      font-size: 0.95rem;
    }
    .vr-hall-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      padding: 0 20px;
    }
    .vr-hall-cards-wrapper {
      display: flex;
      gap: 24px;
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }
    .vr-hall-card {
      min-width: 260px;
      max-width: 260px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      flex-shrink: 0;
    }
    .vr-hall-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      border-color: var(--brand-accent);
      background: rgba(255,255,255,0.12);
    }
    .vr-hall-card-img {
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .vr-hall-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .vr-hall-card:hover .vr-hall-card-img img {
      transform: scale(1.08);
    }
    .vr-hall-card-body {
      padding: 18px 16px;
    }
    .vr-hall-card-body h5 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .vr-hall-card-body .vr-card-type {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
      background: rgba(199, 165, 109, 0.2);
      color: var(--brand-accent);
      margin-bottom: 8px;
    }
    .vr-hall-card-body p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .vr-hall-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all var(--transition-fast);
      backdrop-filter: blur(8px);
    }
    .vr-hall-nav:hover {
      background: rgba(255,255,255,0.2);
      border-color: var(--brand-accent);
    }
    .vr-hall-nav.prev { left: 8px; }
    .vr-hall-nav.next { right: 8px; }
    .vr-hall-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }
    .vr-hall-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .vr-hall-dot.active {
      background: var(--brand-accent);
      width: 24px;
      border-radius: 4px;
    }
    .vr-hall-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(7, 27, 45, 0.9);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
    }
    .vr-hall-modal.open { display: flex; }
    .vr-hall-modal-content {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      max-width: 640px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px 32px;
      position: relative;
    }
    .vr-hall-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      color: var(--text-secondary);
    }
    .vr-hall-modal-close:hover {
      background: var(--line-soft);
      color: var(--text-strong);
    }
    .vr-hall-modal-img {
      aspect-ratio: 16/9;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .vr-hall-modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .vr-hall-modal-body h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-strong);
    }
    .vr-hall-modal-body p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    @media (max-width: 767px) {
      .vr-hall-stage { padding: 40px 16px; min-height: 400px; }
      .vr-hall-title h1 { font-size: 1.5rem; }
      .vr-hall-card { min-width: 220px; max-width: 220px; }
      .vr-hall-nav { width: 36px; height: 36px; }
      .vr-hall-grid { padding: 0 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>

      <div class="vr-hall-container">
        <div class="vr-hall-stage" id="vrHallStage">
          <div class="vr-hall-title">
            <h1>VR数字展厅</h1>
            <p>滑动浏览展项，点击卡片查看详情</p>
          </div>

          <div class="vr-hall-grid" id="vrHallGrid">
            <button class="vr-hall-nav prev" id="vrHallPrev" aria-label="上一个">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="vr-hall-cards-wrapper" id="vrHallCardsWrapper"></div>
            <button class="vr-hall-nav next" id="vrHallNext" aria-label="下一个">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <div class="vr-hall-dots" id="vrHallDots"></div>
        </div>
      </div>

      <div class="vr-hall-modal" id="vrHallModal">
        <div class="vr-hall-modal-content">
          <button class="vr-hall-modal-close" id="vrHallModalClose">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div id="vrHallModalBody"></div>
        </div>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('museum'));
      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: 'AR/VR鸟类博物馆', href: '/museum/index.html' },
        { label: 'VR展厅' }
      ]);

      var exhibits = await loadData('museumExhibits');
      var typeColors = {
        '数字展柜': '#2D6A4F',
        '迁徙地图': '#1B4F72',
        '鸟鸣声音库': '#B8860B',
        'AR互动': '#6B4226'
      };

      var cardsWrapper = document.getElementById('vrHallCardsWrapper');
      var dotsContainer = document.getElementById('vrHallDots');
      var currentIndex = 0;
      var visibleCount = 3;

      function updateVisibleCount() {
        visibleCount = window.innerWidth < 768 ? 1 : (window.innerWidth < 992 ? 2 : 3);
      }
      updateVisibleCount();

      function renderCards() {
        var html = '';
        exhibits.forEach(function(ex, i) {
          html += '<div class="vr-hall-card" data-exhibit-index="' + i + '">';
          html += '<div class="vr-hall-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, ' + (typeColors[ex.type] || '#16395C') + ', ' + (typeColors[ex.type] || '#16395C') + '); width:100%; height:100%; object-fit:cover;" alt="' + esc(ex.title) + '">';
          html += '</div>';
          html += '<div class="vr-hall-card-body">';
          html += '<h5>' + esc(ex.title) + '</h5>';
          html += '<span class="vr-card-type">' + esc(ex.type) + '</span>';
          html += '<p>' + esc(ex.description) + '</p>';
          html += '</div>';
          html += '</div>';
        });
        cardsWrapper.innerHTML = html;
      }

      function renderDots() {
        var totalPages = Math.ceil(exhibits.length / visibleCount);
        var html = '';
        for (var i = 0; i < totalPages; i++) {
          html += '<span class="vr-hall-dot' + (i === currentIndex ? ' active' : '') + '" data-dot-index="' + i + '"></span>';
        }
        dotsContainer.innerHTML = html;
      }

      function scrollToIndex(idx) {
        var totalPages = Math.ceil(exhibits.length / visibleCount);
        idx = Math.max(0, Math.min(idx, totalPages - 1));
        currentIndex = idx;
        var cardWidth = 260 + 24;
        if (window.innerWidth < 768) cardWidth = 220 + 24;
        cardsWrapper.style.transform = 'translateX(-' + (idx * visibleCount * cardWidth) + 'px)';
        renderDots();
      }

      renderCards();
      renderDots();

      document.getElementById('vrHallPrev').addEventListener('click', function() {
        scrollToIndex(currentIndex - 1);
      });

      document.getElementById('vrHallNext').addEventListener('click', function() {
        scrollToIndex(currentIndex + 1);
      });

      dotsContainer.addEventListener('click', function(e) {
        var dot = e.target.closest('.vr-hall-dot');
        if (!dot) return;
        var idx = parseInt(dot.getAttribute('data-dot-index'));
        scrollToIndex(idx);
      });

      var modal = document.getElementById('vrHallModal');
      var modalBody = document.getElementById('vrHallModalBody');

      cardsWrapper.addEventListener('click', function(e) {
        var card = e.target.closest('.vr-hall-card');
        if (!card) return;
        var idx = parseInt(card.getAttribute('data-exhibit-index'));
        var ex = exhibits[idx];
        if (!ex) return;

        var html = '<div class="vr-hall-modal-img">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, ' + (typeColors[ex.type] || '#16395C') + ', ' + (typeColors[ex.type] || '#16395C') + '); width:100%; height:100%; object-fit:cover;" alt="' + esc(ex.title) + '">';
        html += '</div>';
        html += '<div class="vr-hall-modal-body">';
        html += '<h2>' + esc(ex.title) + '</h2>';
        html += '<span class="vr-card-type" style="margin-bottom:12px;display:inline-block;">' + esc(ex.type) + '</span>';
        html += '<p>' + esc(ex.description) + '</p>';
        html += '<a href="/museum/exhibit-detail.html?id=' + esc(ex.id) + '" class="btn btn-accent">查看展项详情</a>';
        html += '</div>';
        modalBody.innerHTML = html;
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      });

      document.getElementById('vrHallModalClose').addEventListener('click', function() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      });

      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          modal.classList.remove('open');
          document.body.style.overflow = '';
        }
      });

      window.addEventListener('resize', function() {
        updateVisibleCount();
        scrollToIndex(currentIndex);
      });

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
