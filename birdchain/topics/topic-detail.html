<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专题详情 - BirdChain鸟链</title>
  <meta name="description" content="BirdChain专题详情页面，深入阅读鸟类研究、保护、摄影等深度报道。">
  <meta property="og:title" content="专题详情 - BirdChain鸟链">
  <meta property="og:description" content="深入阅读鸟类研究、保护、摄影等深度报道。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-topic-cover {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 21/9;
      max-height: 400px;
      margin: 20px 0 32px;
    }
    .bc-topic-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-topic-cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 27, 45, 0.88), rgba(7, 27, 45, 0.15));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px 40px;
      color: #fff;
    }
    .bc-topic-cover-overlay .category {
      display: inline-block;
      padding: 4px 14px;
      background: rgba(199, 165, 109, 0.3);
      border: 1px solid rgba(199, 165, 109, 0.5);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 10px;
      width: fit-content;
      backdrop-filter: blur(4px);
    }
    .bc-topic-cover-overlay h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .bc-topic-cover-overlay .desc {
      font-size: 0.95rem;
      opacity: 0.88;
      max-width: 640px;
      line-height: 1.6;
    }
    .bc-topic-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      margin-bottom: 48px;
    }
    .bc-topic-sidebar {
      position: sticky;
      top: calc(var(--header-height) + 20px);
      align-self: start;
    }
    .bc-toc-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }
    .bc-toc-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
    }
    .bc-toc-list {
      list-style: none;
      padding: 0;
    }
    .bc-toc-list li {
      padding: 7px 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color var(--transition-fast);
      border-left: 2px solid transparent;
      padding-left: 12px;
    }
    .bc-toc-list li:hover,
    .bc-toc-list li.active {
      color: var(--brand-accent-dark);
      border-left-color: var(--brand-accent);
    }
    .bc-author-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .bc-author-card .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 10px;
      overflow: hidden;
    }
    .bc-author-card .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-author-card .name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .bc-author-card .bio {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .bc-author-card .stats-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .bc-topic-articles {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bc-topic-article-item {
      display: flex;
      gap: 18px;
      padding: 18px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    .bc-topic-article-item:hover {
      box-shadow: var(--shadow-md);
      transform: translateX(4px);
    }
    .bc-topic-article-item-img {
      width: 180px;
      height: 120px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .bc-topic-article-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-topic-article-item-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bc-topic-article-item-body h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .bc-topic-article-item-body .summary {
      font-size: 0.84rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bc-topic-article-item-body .meta {
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: flex;
      gap: 14px;
    }
    .bc-related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .bc-related-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      transition: all var(--transition-normal);
      cursor: pointer;
    }
    .bc-related-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .bc-related-card-img {
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .bc-related-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-related-card-body {
      padding: 12px;
    }
    .bc-related-card-body h5 {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .bc-related-card-body .sub {
      font-size: 0.76rem;
      color: var(--text-secondary);
    }
    .bc-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .bc-not-found h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .bc-not-found p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    @media (max-width: 900px) {
      .bc-topic-layout { grid-template-columns: 1fr; }
      .bc-topic-sidebar { position: static; }
      .bc-topic-article-item { flex-direction: column; }
      .bc-topic-article-item-img { width: 100%; height: 160px; }
      .bc-related-grid { grid-template-columns: repeat(2, 1fr); }
      .bc-topic-cover-overlay h1 { font-size: 1.4rem; }
    }
    @media (max-width: 560px) {
      .bc-related-grid { grid-template-columns: 1fr; }
      .bc-topic-cover { aspect-ratio: 16/9; max-height: none; }
      .bc-topic-cover-overlay { padding: 20px 24px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="topicContent"></div>
      <div id="notFound" style="display:none;">
        <div class="bc-not-found">
          <h2>专题未找到</h2>
          <p>您访问的专题不存在或已被移除。</p>
          <a href="/topics/" class="btn btn-accent" style="padding:10px 28px;border-radius:24px;display:inline-block;">返回专题主页</a>
        </div>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var BC = window.BirdChainComponents;
      var BD = window.BirdChainData;
      var BI = window.BirdChainInteractions;

      var app = document.getElementById('app');
      app.insertAdjacentHTML('afterbegin', BC.renderHeader('topics'));
      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '专题/深度分析', href: '/topics/' },
        { label: '专题详情' }
      ]);

      var params = new URLSearchParams(window.location.search);
      var topicId = params.get('id');

      var topics = await BD.loadData('topics');
      var articles = await BD.loadData('articles');
      var creators = await BD.loadData('creators');
      var stations = await BD.loadData('stations');
      var species = await BD.loadData('species');
      var works = await BD.loadData('works');

      var creatorMap = {};
      creators.forEach(function(c) { creatorMap[c.id] = c; });

      var stationMap = {};
      stations.forEach(function(s) { stationMap[s.id] = s; });

      var speciesMap = {};
      species.forEach(function(s) { speciesMap[s.id] = s; });

      var workMap = {};
      works.forEach(function(w) { workMap[w.id] = w; });

      var topic = topics.find(function(t) { return t.id === topicId; });
      if (!topic) {
        document.getElementById('notFound').style.display = '';
        return;
      }

      document.title = topic.title + ' - BirdChain鸟链';
      document.querySelector('meta[name="description"]').setAttribute('content', topic.summary);
      document.querySelector('meta[property="og:title"]').setAttribute('content', topic.title + ' - BirdChain鸟链');
      document.querySelector('meta[property="og:description"]').setAttribute('content', topic.summary);

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '专题/深度分析', href: '/topics/' },
        { label: topic.title }
      ]);

      var topicArticles = articles.filter(function(a) { return a.topicId === topic.id; });
      var author = creatorMap[topic.authorId];

      var allRelatedSpeciesIds = [];
      var allRelatedWorkIds = [];
      var relatedStationIds = [];
      topicArticles.forEach(function(a) {
        (a.relatedSpecies || []).forEach(function(sid) {
          if (allRelatedSpeciesIds.indexOf(sid) === -1) allRelatedSpeciesIds.push(sid);
        });
        (a.relatedWorks || []).forEach(function(wid) {
          if (allRelatedWorkIds.indexOf(wid) === -1) allRelatedWorkIds.push(wid);
        });
      });

      species.forEach(function(s) {
        var found = topicArticles.some(function(a) {
          return (a.tags || []).some(function(t) {
            return s.nameCn && t.indexOf(s.nameCn) !== -1;
          });
        });
        if (found && allRelatedSpeciesIds.indexOf(s.id) === -1) {
          allRelatedSpeciesIds.push(s.id);
        }
      });

      works.forEach(function(w) {
        if (w.stationId && relatedStationIds.indexOf(w.stationId) === -1) {
          relatedStationIds.push(w.stationId);
        }
      });

      function renderSections() {
        var sections = [];
        if (topicArticles.length > 0) sections.push({ id: 'articles', label: '专题文章 (' + topicArticles.length + '篇)' });
        if (allRelatedSpeciesIds.length > 0) sections.push({ id: 'species', label: '相关物种 (' + allRelatedSpeciesIds.length + ')' });
        if (relatedStationIds.length > 0) sections.push({ id: 'stations', label: '相关地方站 (' + relatedStationIds.length + ')' });
        if (allRelatedWorkIds.length > 0) sections.push({ id: 'works', label: '相关作品 (' + allRelatedWorkIds.length + ')' });
        return sections;
      }

      var sections = renderSections();

      var html = '';

      html += '<div class="bc-topic-cover">';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #1B4332, #2D6A4F, #40916C);" alt="' + esc(topic.title) + '">';
      html += '<div class="bc-topic-cover-overlay">';
      html += '<span class="category">' + esc(topic.category) + '</span>';
      html += '<h1>' + esc(topic.title) + '</h1>';
      html += '<p class="desc">' + esc(topic.summary) + '</p>';
      html += '</div>';
      html += '</div>';

      html += '<div class="bc-topic-layout">';

      html += '<aside class="bc-topic-sidebar">';
      if (sections.length > 0) {
        html += '<div class="bc-toc-card">';
        html += '<h3>目录导航</h3>';
        html += '<ul class="bc-toc-list">';
        sections.forEach(function(s, i) {
          html += '<li data-scroll-to="' + s.id + '" class="' + (i === 0 ? 'active' : '') + '">' + esc(s.label) + '</li>';
        });
        html += '</ul>';
        html += '</div>';
      }

      if (author) {
        html += '<div class="bc-author-card">';
        html += '<div class="avatar">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #6B4226, #8B6914);" alt="' + esc(author.name) + '">';
        html += '</div>';
        html += '<div class="name">' + esc(author.name);
        if (author.verified) html += ' <svg width="14" height="14" viewBox="0 0 24 24" fill="#C7A56D" style="display:inline;vertical-align:-2px"><circle cx="12" cy="12" r="10" fill="#C7A56D"/><polyline points="7 12 10 15 17 8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        html += '</div>';
        html += '<div class="bio">' + esc((author.bio || '').substring(0, 80) + '...') + '</div>';
        html += '<div class="stats-row">';
        html += '<span>' + (author.works || 0) + ' 作品</span>';
        html += '<span>' + ((author.followers || 0) / 10000).toFixed(1) + '万 粉丝</span>';
        html += '</div>';
        html += '<button class="btn btn-outline btn-sm" data-action="follow" data-creator-id="' + author.id + '" data-creator-name="' + esc(author.name) + '">关注</button>';
        html += '</div>';
      }
      html += '</aside>';

      html += '<div class="bc-topic-main">';

      html += '<section id="section-articles">';
      html += '<h2 class="section-title">专题文章</h2>';
      html += '<div class="bc-topic-articles">';
      topicArticles.forEach(function(a) {
        html += '<div class="bc-topic-article-item" onclick="window.location.href=\'/topics/article-detail.html?id=' + a.id + '\'">';
        html += '<div class="bc-topic-article-item-img">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #2D6A4F, #40916C);" alt="' + esc(a.title) + '">';
        html += '</div>';
        html += '<div class="bc-topic-article-item-body">';
        html += '<h4>' + esc(a.title) + '</h4>';
        html += '<div class="summary">' + esc(a.summary) + '</div>';
        html += '<div class="meta">';
        html += '<span>' + esc(a.authorName) + '</span>';
        html += '<span>' + esc(a.publishDate) + '</span>';
        html += '<span>' + (a.views || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' 阅读</span>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      html += '</section>';

      if (allRelatedSpeciesIds.length > 0) {
        html += '<section id="section-species" style="margin-top:40px;">';
        html += '<h2 class="section-title">相关物种</h2>';
        html += '<div class="bc-related-grid">';
        allRelatedSpeciesIds.forEach(function(sid) {
          var sp = speciesMap[sid];
          if (!sp) return;
          html += '<div class="bc-related-card">';
          html += '<div class="bc-related-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #1B4F72, #2980B9);" alt="' + esc(sp.nameCn) + '">';
          html += '</div>';
          html += '<div class="bc-related-card-body">';
          html += '<h5>' + esc(sp.nameCn) + '</h5>';
          html += '<div class="sub">' + esc(sp.nameEn) + '</div>';
          html += '<div class="sub" style="font-size:0.72rem;color:var(--brand-accent)">' + esc(sp.conservation) + '</div>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
        html += '</section>';
      }

      if (relatedStationIds.length > 0) {
        html += '<section id="section-stations" style="margin-top:40px;">';
        html += '<h2 class="section-title">相关地方站</h2>';
        html += '<div class="bc-related-grid">';
        relatedStationIds.slice(0, 6).forEach(function(sid) {
          var st = stationMap[sid];
          if (!st) return;
          html += '<div class="bc-related-card">';
          html += '<div class="bc-related-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #52796F, #84A98C);" alt="' + esc(st.name) + '">';
          html += '</div>';
          html += '<div class="bc-related-card-body">';
          html += '<h5>' + esc(st.name) + '</h5>';
          html += '<div class="sub">' + esc(st.location) + '</div>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
        html += '</section>';
      }

      if (allRelatedWorkIds.length > 0) {
        html += '<section id="section-works" style="margin-top:40px;">';
        html += '<h2 class="section-title">相关作品</h2>';
        html += '<div class="bc-related-grid">';
        allRelatedWorkIds.slice(0, 6).forEach(function(wid) {
          var wk = workMap[wid];
          if (!wk) return;
          html += '<div class="bc-related-card" onclick="window.location.href=\'/discover/work-detail.html?id=' + wk.id + '\'">';
          html += '<div class="bc-related-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #BC6C25, #DDA15E);" alt="' + esc(wk.title) + '">';
          html += '</div>';
          html += '<div class="bc-related-card-body">';
          html += '<h5>' + esc(wk.title) + '</h5>';
          html += '<div class="sub">' + esc(wk.category) + ' · ' + esc(wk.species) + '</div>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
        html += '</section>';
      }

      html += '</div>';
      html += '</div>';

      document.getElementById('topicContent').innerHTML = html;

      document.querySelectorAll('[data-scroll-to]').forEach(function(li) {
        li.addEventListener('click', function() {
          var target = document.getElementById('section-' + this.getAttribute('data-scroll-to'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('.bc-toc-list li').forEach(function(l) { l.classList.remove('active'); });
            this.classList.add('active');
          }
        });
      });
    });
  </script>
</body>
</html>
