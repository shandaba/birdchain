<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专题/深度分析 - BirdChain鸟链</title>
  <meta name="description" content="BirdChain专题频道，汇聚鸟类迁徙研究、物种深度报道、栖息地保护、行为观察、摄影故事等深度内容。">
  <meta property="og:title" content="专题/深度分析 - BirdChain鸟链">
  <meta property="og:description" content="鸟类迁徙研究、物种深度报道、栖息地保护、行为观察、摄影故事等深度内容。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-topics-hero {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 21/9;
      max-height: 420px;
      margin: 20px 0 32px;
      cursor: pointer;
    }
    .bc-topics-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-topics-hero-content {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 27, 45, 0.85), rgba(7, 27, 45, 0.2), rgba(7, 27, 45, 0.05));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px 40px;
      color: #fff;
    }
    .bc-topics-hero-tag {
      display: inline-block;
      padding: 4px 14px;
      background: rgba(199, 165, 109, 0.3);
      border: 1px solid rgba(199, 165, 109, 0.5);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 10px;
      width: fit-content;
      backdrop-filter: blur(4px);
    }
    .bc-topics-hero-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      max-width: 700px;
    }
    .bc-topics-hero-content p {
      font-size: 0.95rem;
      opacity: 0.88;
      max-width: 600px;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .bc-topics-hero-stats {
      font-size: 0.82rem;
      opacity: 0.75;
    }
    .bc-category-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .bc-category-chip {
      padding: 7px 18px;
      border-radius: 22px;
      font-size: 0.84rem;
      font-weight: 500;
      background: var(--bg-soft);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .bc-category-chip:hover,
    .bc-category-chip.active {
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
      border-color: var(--brand-accent);
    }
    .bc-topics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .bc-topic-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      transition: all var(--transition-normal);
      cursor: pointer;
    }
    .bc-topic-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .bc-topic-card-img {
      aspect-ratio: 21/9;
      overflow: hidden;
    }
    .bc-topic-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-slow);
    }
    .bc-topic-card:hover .bc-topic-card-img img {
      transform: scale(1.05);
    }
    .bc-topic-card-body {
      padding: 16px;
    }
    .bc-topic-card-body h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .bc-topic-card-body p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bc-topic-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .bc-topic-card-category {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
    }
    .bc-editors-pick {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      margin-bottom: 48px;
    }
    .bc-editors-pick-main {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    .bc-editors-pick-main:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    .bc-editors-pick-main-img {
      aspect-ratio: 21/9;
      overflow: hidden;
    }
    .bc-editors-pick-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-editors-pick-main-body {
      padding: 20px 24px;
    }
    .bc-editors-pick-main-body h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .bc-editors-pick-main-body p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .bc-editors-pick-side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bc-editors-pick-item {
      display: flex;
      gap: 14px;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    .bc-editors-pick-item:hover {
      box-shadow: var(--shadow-md);
      transform: translateX(4px);
    }
    .bc-editors-pick-item-img {
      width: 120px;
      height: 80px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .bc-editors-pick-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-editors-pick-item-body h4 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bc-editors-pick-item-body .meta {
      font-size: 0.76rem;
      color: var(--text-secondary);
    }
    .bc-articles-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }
    .bc-article-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      transition: all var(--transition-normal);
      cursor: pointer;
    }
    .bc-article-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .bc-article-card-img {
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .bc-article-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-slow);
    }
    .bc-article-card:hover .bc-article-card-img img {
      transform: scale(1.05);
    }
    .bc-article-card-body {
      padding: 16px;
    }
    .bc-article-card-body h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bc-article-card-body .excerpt {
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bc-article-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .bc-article-card-meta .author {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bc-article-card-meta .role-badge {
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 500;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
    }
    .bc-columnists-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    .bc-columnist-mini {
      padding: 20px 16px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      text-align: center;
      transition: all var(--transition-normal);
      cursor: pointer;
    }
    .bc-columnist-mini:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .bc-columnist-mini .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 10px;
      overflow: hidden;
    }
    .bc-columnist-mini .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-columnist-mini .name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .bc-columnist-mini .specialty {
      font-size: 0.76rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .bc-columnist-mini .stats {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .bc-tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 48px;
    }
    .bc-tag-link {
      padding: 5px 14px;
      border-radius: 18px;
      font-size: 0.82rem;
      background: var(--bg-soft);
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      cursor: pointer;
      border: 1px solid transparent;
    }
    .bc-tag-link:hover,
    .bc-tag-link.hot {
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
      border-color: var(--brand-accent);
    }
    .bc-tag-link.hot {
      font-weight: 600;
    }
    .bc-columnist-cta {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(135deg, #16395C, #1B4F72);
      padding: 48px 40px;
      text-align: center;
      color: #fff;
      margin: 48px 0 60px;
      position: relative;
    }
    .bc-columnist-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(199, 165, 109, 0.12), transparent 60%);
      pointer-events: none;
    }
    .bc-columnist-cta h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      position: relative;
    }
    .bc-columnist-cta p {
      font-size: 0.95rem;
      opacity: 0.85;
      max-width: 520px;
      margin: 0 auto 24px;
      position: relative;
    }
    .bc-columnist-cta .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      position: relative;
    }
    .bc-columnist-cta .btn-accent {
      padding: 12px 28px;
      border-radius: 28px;
      background: var(--brand-accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background var(--transition-fast);
    }
    .bc-columnist-cta .btn-accent:hover {
      background: var(--brand-accent-dark);
    }
    .bc-columnist-cta .btn-outline-light {
      padding: 12px 28px;
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.4);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition-fast);
    }
    .bc-columnist-cta .btn-outline-light:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }
    @media (max-width: 900px) {
      .bc-editors-pick { grid-template-columns: 1fr; }
      .bc-topics-grid { grid-template-columns: repeat(2, 1fr); }
      .bc-articles-grid-3 { grid-template-columns: repeat(2, 1fr); }
      .bc-columnists-grid { grid-template-columns: repeat(2, 1fr); }
      .bc-topics-hero { aspect-ratio: 16/9; max-height: none; }
      .bc-topics-hero-content h1 { font-size: 1.4rem; }
    }
    @media (max-width: 560px) {
      .bc-topics-grid { grid-template-columns: 1fr; }
      .bc-articles-grid-3 { grid-template-columns: 1fr; }
      .bc-columnists-grid { grid-template-columns: 1fr; }
      .bc-topics-hero-content { padding: 20px 24px; }
      .bc-topics-hero-content h1 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>

      <div class="bc-topics-hero" id="featuredTopicHero" style="display:none">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
             style="background: linear-gradient(135deg, #1B4332, #2D6A4F, #40916C);" alt="">
        <div class="bc-topics-hero-content">
          <span class="bc-topics-hero-tag" id="featuredTopicTag"></span>
          <h1 id="featuredTopicTitle"></h1>
          <p id="featuredTopicDesc"></p>
          <div class="bc-topics-hero-stats" id="featuredTopicStats"></div>
        </div>
      </div>

      <div class="bc-category-nav" id="categoryNav"></div>

      <section id="editorsPickSection" style="display:none">
        <div class="section-header">
          <h2 class="section-title">编辑推荐</h2>
        </div>
        <div class="bc-editors-pick" id="editorsPickGrid"></div>
      </section>

      <section id="longformSection" style="display:none">
        <div class="section-header">
          <h2 class="section-title">深度长文</h2>
          <a href="#all-articles" class="text-sm" style="color:var(--brand-accent);font-weight:500;">查看全部 &rarr;</a>
        </div>
        <div class="bc-articles-grid-3" id="longformGrid"></div>
      </section>

      <section id="columnistsSection" style="display:none">
        <div class="section-header">
          <h2 class="section-title">专栏推荐</h2>
          <a href="/topics/columnists.html" class="text-sm" style="color:var(--brand-accent);font-weight:500;">全部专栏作者 &rarr;</a>
        </div>
        <div class="bc-columnists-grid" id="columnistsGrid"></div>
      </section>

      <section id="tagCloudSection">
        <h2 class="section-title" style="margin-bottom:16px;">热门标签</h2>
        <div class="bc-tag-cloud" id="tagCloud"></div>
      </section>

      <div class="bc-columnist-cta">
        <h2>成为BirdChain专栏作者</h2>
        <p>分享你的观鸟故事、研究成果或摄影技巧，与全球鸟类爱好者一起探索自然之美。</p>
        <div class="btn-group">
          <a href="/topics/write-article.html" class="btn-accent">开始创作</a>
          <a href="/topics/columnists.html" class="btn-outline-light">了解专栏作者计划</a>
        </div>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var BC = window.BirdChainComponents;
      var BD = window.BirdChainData;
      var BI = window.BirdChainInteractions;

      var app = document.getElementById('app');
      app.insertAdjacentHTML('afterbegin', BC.renderHeader('topics'));
      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '专题/深度分析' }
      ]);

      var topics = await BD.loadData('topics');
      var articles = await BD.loadData('articles');
      var creators = await BD.loadData('creators');

      var creatorMap = {};
      creators.forEach(function(c) { creatorMap[c.id] = c; });

      var CATEGORIES = [
        { id: 'all', label: '全部' },
        { id: '迁徙研究', label: '迁徙研究' },
        { id: '物种深度', label: '物种深度' },
        { id: '栖息地保护', label: '栖息地保护' },
        { id: '行为观察', label: '行为观察' },
        { id: '摄影故事', label: '摄影故事' },
        { id: '保育前沿', label: '保育前沿' },
        { id: '专家专栏', label: '专家专栏' },
        { id: '学校产学研', label: '学校产学研' },
        { id: '地方文旅观察', label: '地方文旅观察' },
        { id: '儿童自然教育', label: '儿童自然教育' }
      ];

      var currentCategory = 'all';

      function renderCategoryNav() {
        var html = '';
        CATEGORIES.forEach(function(cat) {
          var cls = 'bc-category-chip' + (cat.id === currentCategory ? ' active' : '');
          html += '<button class="' + cls + '" data-category="' + cat.id + '">' + cat.label + '</button>';
        });
        document.getElementById('categoryNav').innerHTML = html;

        document.getElementById('categoryNav').addEventListener('click', function(e) {
          var chip = e.target.closest('[data-category]');
          if (!chip) return;
          currentCategory = chip.getAttribute('data-category');
          renderCategoryNav();
          filterContent();
        });
      }

      function filterContent() {
        var filteredTopics = currentCategory === 'all'
          ? topics
          : topics.filter(function(t) { return t.category === currentCategory; });

        var filteredArticles = currentCategory === 'all'
          ? articles
          : articles.filter(function(a) {
              var topic = topics.find(function(t) { return t.id === a.topicId; });
              return topic && topic.category === currentCategory;
            });

        renderFeaturedTopic(filteredTopics);
        renderEditorsPick(filteredArticles, creatorMap);
        renderLongformArticles(filteredArticles, creatorMap);
      }

      function renderFeaturedTopic(filteredTopics) {
        var hero = document.getElementById('featuredTopicHero');
        if (filteredTopics.length === 0) { hero.style.display = 'none'; return; }

        var featured = filteredTopics[0];
        hero.style.display = '';

        var img = hero.querySelector('img');
        img.style.background = 'linear-gradient(135deg, #1B4332, #2D6A4F, #40916C)';

        document.getElementById('featuredTopicTag').textContent = featured.category;
        document.getElementById('featuredTopicTitle').textContent = featured.title;
        document.getElementById('featuredTopicDesc').textContent = featured.summary;
        document.getElementById('featuredTopicStats').textContent =
          featured.authorName + ' · ' + featured.articleCount + '篇文章 · ' + (featured.views / 10000).toFixed(1) + '万浏览';

        hero.onclick = function() {
          window.location.href = '/topics/topic-detail.html?id=' + featured.id;
        };
      }

      function renderEditorsPick(filteredArticles, creatorMap) {
        var section = document.getElementById('editorsPickSection');
        if (filteredArticles.length < 3) { section.style.display = 'none'; return; }
        section.style.display = '';

        var sorted = filteredArticles.slice().sort(function(a, b) { return (b.likes || 0) - (a.likes || 0); });
        var main = sorted[0];
        var side = sorted.slice(1, 4);

        var html = '';

        html += '<div class="bc-editors-pick-main" onclick="window.location.href=\'/topics/article-detail.html?id=' + main.id + '\'">';
        html += '<div class="bc-editors-pick-main-img">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #2a5c4a, #1a3a2a);" alt="' + esc(main.title) + '">';
        html += '</div>';
        html += '<div class="bc-editors-pick-main-body">';
        html += '<h3>' + esc(main.title) + '</h3>';
        html += '<p>' + esc(main.summary) + '</p>';
        html += '</div>';
        html += '</div>';

        html += '<div class="bc-editors-pick-side">';
        side.forEach(function(a) {
          html += '<div class="bc-editors-pick-item" onclick="window.location.href=\'/topics/article-detail.html?id=' + a.id + '\'">';
          html += '<div class="bc-editors-pick-item-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #457B9D, #A8DADC);" alt="' + esc(a.title) + '">';
          html += '</div>';
          html += '<div class="bc-editors-pick-item-body">';
          html += '<h4>' + esc(a.title) + '</h4>';
          html += '<div class="meta">' + esc(a.authorName) + ' · ' + esc(a.publishDate) + '</div>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';

        document.getElementById('editorsPickGrid').innerHTML = html;
      }

      function renderLongformArticles(filteredArticles, creatorMap) {
        var section = document.getElementById('longformSection');
        if (filteredArticles.length === 0) { section.style.display = 'none'; return; }
        section.style.display = '';

        var sorted = filteredArticles.slice().sort(function(a, b) {
          return new Date(b.publishDate) - new Date(a.publishDate);
        });

        var html = '';
        sorted.forEach(function(a) {
          html += '<div class="bc-article-card" onclick="window.location.href=\'/topics/article-detail.html?id=' + a.id + '\'">';
          html += '<div class="bc-article-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #3A5A40, #588157);" alt="' + esc(a.title) + '">';
          html += '</div>';
          html += '<div class="bc-article-card-body">';
          html += '<h4>' + esc(a.title) + '</h4>';
          html += '<div class="excerpt">' + esc(a.summary) + '</div>';
          html += '<div class="bc-article-card-meta">';
          html += '<div class="author">';
          html += '<span>' + esc(a.authorName) + '</span>';
          html += '<span class="role-badge">' + esc(a.authorRole || '作者') + '</span>';
          html += '</div>';
          html += '<span>' + esc(a.publishDate) + '</span>';
          html += '</div>';
          html += '</div>';
          html += '</div>';
        });

        document.getElementById('longformGrid').innerHTML = html;
      }

      function renderColumnistsSection() {
        var section = document.getElementById('columnistsSection');
        var writerIds = [];
        articles.forEach(function(a) { if (writerIds.indexOf(a.authorId) === -1) writerIds.push(a.authorId); });

        var columnists = writers.slice(0, 8).filter(function(c) {
          return writerIds.indexOf(c.id) !== -1 || (c.specialties && c.specialties.some(function(s) {
            return ['珍稀鸟类', '湿地鸟类', '高原鸟类', '生态'].indexOf(s) !== -1 || s.indexOf('鸟类') !== -1;
          }));
        });

        if (columnists.length === 0) { section.style.display = 'none'; return; }
        section.style.display = '';

        var html = '';
        columnists.forEach(function(c) {
          var articleCount = articles.filter(function(a) { return a.authorId === c.id; }).length;
          html += '<div class="bc-columnist-mini" onclick="window.location.href=\'/topics/columnists.html\'">';
          html += '<div class="avatar">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #6B4226, #8B6914);" alt="' + esc(c.name) + '">';
          html += '</div>';
          html += '<div class="name">' + esc(c.name);
          if (c.verified) html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="#C7A56D" style="flex-shrink:0"><circle cx="12" cy="12" r="10" fill="#C7A56D"/><polyline points="7 12 10 15 17 8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          html += '</div>';
          html += '<div class="specialty">' + esc((c.specialties || ['鸟类观察'])[0]) + '</div>';
          html += '<div class="stats">' + articleCount + '篇文章 · ' + (c.followers / 10000).toFixed(1) + '万粉丝</div>';
          html += '<button class="btn btn-outline btn-sm" data-action="follow" data-creator-id="' + c.id + '" data-creator-name="' + esc(c.name) + '" style="font-size:0.78rem;padding:5px 16px;">关注</button>';
          html += '</div>';
        });

        document.getElementById('columnistsGrid').innerHTML = html;
      }

      function renderTagCloud() {
        var allTags = {};
        articles.forEach(function(a) {
          (a.tags || []).forEach(function(t) {
            allTags[t] = (allTags[t] || 0) + 1;
          });
        });

        var tags = Object.keys(allTags).sort(function(a, b) { return allTags[b] - allTags[a]; });
        var topTags = tags.slice(0, 20);

        var html = '';
        topTags.forEach(function(t, i) {
          var cls = 'bc-tag-link' + (i < 5 ? ' hot' : '');
          html += '<span class="' + cls + '" data-tag="' + esc(t) + '">' + esc(t) + ' (' + allTags[t] + ')</span>';
        });
        document.getElementById('tagCloud').innerHTML = html;

        document.getElementById('tagCloud').addEventListener('click', function(e) {
          var tag = e.target.closest('[data-tag]');
          if (!tag) return;
          var tagName = tag.getAttribute('data-tag');
          var matchingArticles = articles.filter(function(a) {
            return a.tags && a.tags.indexOf(tagName) !== -1;
          });
          renderLongformArticles(matchingArticles, creatorMap);
          document.getElementById('longformSection').querySelector('.section-title').textContent = '标签: ' + tagName;
          document.getElementById('longformSection').querySelector('.text-sm').textContent = '返回全部 &rarr;';
          document.getElementById('longformSection').querySelector('.text-sm').setAttribute('href', '#');
          document.getElementById('longformSection').querySelector('.text-sm').onclick = function() {
            filterContent();
          };
          document.getElementById('longformSection').scrollIntoView({ behavior: 'smooth' });
        });
      }

      renderCategoryNav();
      renderFeaturedTopic(topics);
      renderEditorsPick(articles, creatorMap);
      renderLongformArticles(articles, creatorMap);
      renderColumnistsSection();
      renderTagCloud();
    });
  </script>
</body>
</html>
