<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作历史 - 鸟类视觉实验室 - BirdChain鸟链</title>
  <meta name="description" content="查看你在BirdChain鸟类视觉实验室的AI创作历史记录。">
  <meta property="og:title" content="创作历史 - BirdChain鸟链">
  <meta property="og:description" content="查看AI创作历史记录。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .history-timeline { max-width: 800px; margin: 0 auto; }
    .history-item {
      display: flex;
      gap: 16px;
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      transition: all var(--transition-fast);
    }
    .history-item:hover { box-shadow: var(--shadow-md); }
    .history-item-thumb {
      width: 120px;
      height: 90px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      overflow: hidden;
    }
    .history-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .history-item-info { flex: 1; min-width: 0; }
    .history-item-info h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .history-item-prompt { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .history-item-meta { font-size: 0.78rem; color: var(--text-secondary); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .history-item-meta .tag { font-size: 0.72rem; }
    .history-clear-btn { display: block; margin: 32px auto 0; }
    .history-empty { text-align: center; padding: 80px 20px; }
    .history-empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    @media (max-width:767px) { .history-item { flex-direction: column; } .history-item-thumb { width: 100%; height: 160px; } }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div class="bc-breadcrumb">
        <a href="/">首页</a><span class="sep">/</span><a href="/lab/index.html">鸟类视觉实验室</a><span class="sep">/</span><span class="current">创作历史</span>
      </div>
      <div class="section-header">
        <h1 class="section-title">创作历史</h1>
        <a href="/lab/create.html" class="btn btn-accent btn-sm">新建创作</a>
      </div>
      <div id="historyContent" class="history-timeline"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var app = document.getElementById('app');
      app.insertAdjacentHTML('afterbegin', BirdChainComponents.renderHeader('lab'));
      app.insertAdjacentHTML('beforeend', BirdChainComponents.renderFooter());
      BirdChainInteractions.initAll();

      var BC = window.BirdChainStorage;
      var history = BC.getItem(BC.KEYS.aiCreationHistory, []);
      var container = document.getElementById('historyContent');

      if (history.length === 0) {
        container.innerHTML =
          '<div class="history-empty">' +
          '<div class="history-empty-icon">📋</div>' +
          '<h4>暂无创作历史</h4>' +
          '<p style="color:var(--text-secondary);margin-top:8px;">开始你的第一次AI鸟类视觉创作吧</p>' +
          '<a href="/lab/create.html" class="btn btn-accent mt-3">开始创作</a>' +
          '</div>';
        return;
      }

      var gradients = ['#1B4332,#2D6A4F','#1B4F72,#2980B9','#B8860B,#DAA520','#006D77,#83C5BE','#2D6A4F,#40916C','#3A5A40,#588157','#BC6C25,#DDA15E','#1B4965,#5FA8D3'];

      history.forEach(function(entry, idx) {
        var grad = gradients[idx % gradients.length];
        var date = new Date(entry.timestamp);
        var dateStr = date.getFullYear() + '-' +
          String(date.getMonth() + 1).padStart(2, '0') + '-' +
          String(date.getDate()).padStart(2, '0') + ' ' +
          String(date.getHours()).padStart(2, '0') + ':' +
          String(date.getMinutes()).padStart(2, '0');

        var item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML =
          '<div class="history-item-thumb">' +
          '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background:linear-gradient(135deg,' + grad + ');width:100%;height:100%;object-fit:cover;" alt="创作缩略图" loading="lazy">' +
          '</div>' +
          '<div class="history-item-info">' +
          '<h4>AI创作 #' + (history.length - idx) + '</h4>' +
          '<div class="history-item-prompt">💬 ' + (entry.prompt||'') + '</div>' +
          '<div class="history-item-meta">' +
          '<span class="tag">' + (entry.style||'') + '</span>' +
          '<span class="tag">' + (entry.type||'') + '</span>' +
          '<span>' + dateStr + '</span>' +
          '<span>生成 ' + (entry.results ? entry.results.length : 0) + ' 个作品</span>' +
          '</div>' +
          '</div>';
        container.appendChild(item);
      });

      var clearBtn = document.createElement('button');
      clearBtn.className = 'btn btn-outline history-clear-btn';
      clearBtn.textContent = '清空创作历史';
      clearBtn.addEventListener('click', function() {
        if (confirm('确定要清空所有创作历史吗？此操作不可撤销。')) {
          BC.setItem(BC.KEYS.aiCreationHistory, []);
          BirdChainInteractions.showToast('创作历史已清空', 'info');
          setTimeout(function() { window.location.reload(); }, 500);
        }
      });
      container.appendChild(clearBtn);
    });
  </script>
</body>
</html>
