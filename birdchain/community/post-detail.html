<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帖子详情 - BirdChain鸟链</title>
  <meta name="description" content="查看鸟类爱好者社区帖子详情，参与讨论与交流。">
  <meta property="og:title" content="帖子详情 - BirdChain鸟链">
  <meta property="og:description" content="查看社区帖子详情，参与鸟类摄影与观鸟讨论。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .post-detail-header {
      margin: 28px 0 24px;
    }
    .post-detail-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-strong);
    }
    .post-detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .post-detail-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-soft);
    }
    .post-detail-author {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .post-detail-date {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .post-detail-category {
      padding: 3px 12px;
      border-radius: 14px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
    }
    .post-detail-content {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-main);
      margin-bottom: 32px;
      padding: 24px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--line-soft);
    }
    .post-detail-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .post-action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 500;
      background: var(--bg-soft);
      color: var(--text-secondary);
      border: 1px solid var(--line-soft);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .post-action-btn:hover { background: var(--bg-card); color: var(--brand-accent); border-color: var(--brand-accent); }
    .post-action-btn.liked { background: var(--brand-accent-soft); color: var(--danger); border-color: var(--danger); }
    .post-action-btn.favorited { background: var(--brand-accent-soft); color: var(--brand-accent-dark); border-color: var(--brand-accent); }
    .comment-section {
      margin-top: 32px;
    }
    .comment-section h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .comment-item {
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--brand-accent-soft);
    }
    .comment-author {
      font-weight: 600;
      font-size: 0.88rem;
    }
    .comment-time {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .comment-text {
      font-size: 0.88rem;
      color: var(--text-main);
      line-height: 1.55;
    }
    .comment-form {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-top: 20px;
    }
    .comment-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line-soft);
      background: var(--bg-soft);
      color: var(--text-main);
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color var(--transition-fast);
      font-family: inherit;
    }
    .comment-form textarea:focus {
      border-color: var(--brand-accent);
    }
    .comment-form-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
    @media (max-width: 767px) {
      .post-detail-header h1 { font-size: 1.3rem; }
      .post-detail-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="postDetailContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('community'));

      var params = new URLSearchParams(window.location.search);
      var postId = params.get('id');

      if (!postId) {
        document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
          { label: '社区', href: '/community/index.html' },
          { label: '帖子详情' }
        ]);
        document.getElementById('postDetailContent').innerHTML = '<div class="section" style="text-align:center"><h2>未指定帖子</h2><p style="color:var(--text-secondary)">请从社区列表选择一个帖子查看</p><a href="/community/index.html" class="btn btn-accent mt-2">返回社区</a></div>';
        app.insertAdjacentHTML('beforeend', BC.renderFooter());
        BI.initAll();
        return;
      }

      var posts = await loadData('communityPosts');
      var post = findById(posts, postId);

      if (!post) {
        document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
          { label: '社区', href: '/community/index.html' },
          { label: '帖子详情' }
        ]);
        document.getElementById('postDetailContent').innerHTML = '<div class="section" style="text-align:center"><h2>帖子不存在</h2><p style="color:var(--text-secondary)">未找到ID为 ' + esc(postId) + ' 的帖子</p><a href="/community/index.html" class="btn btn-accent mt-2">返回社区</a></div>';
        app.insertAdjacentHTML('beforeend', BC.renderFooter());
        BI.initAll();
        return;
      }

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '社区', href: '/community/index.html' },
        { label: post.title }
      ]);

      var BCStorage = window.BirdChainStorage;
      var likedPosts = BCStorage.getItem(BCStorage.KEYS.likedWorks, []);
      var isLiked = likedPosts.some(function(item) { return item.id === post.id; });
      var favPosts = BCStorage.getItem(BCStorage.KEYS.favoriteWorks, []);
      var isFavorited = favPosts.some(function(item) { return item.id === post.id; });

      var comments = BCStorage.getItem(BCStorage.KEYS.comments_data, {});
      var postCommentsKey = 'post_' + post.id;
      var savedComments = comments[postCommentsKey] || [];

      var allComments = (post.replies || []).map(function(r) {
        return { author: r.author, content: r.content, time: r.time, saved: false };
      }).concat(savedComments.map(function(c) {
        return { author: c.author, content: c.content, time: new Date(c.time).toLocaleString('zh-CN'), saved: true };
      }));

      var html = '';

      html += '<div class="post-detail-header">';
      html += '<h1>' + esc(post.title) + '</h1>';
      html += '<div class="post-detail-meta">';
      html += '<div class="post-detail-avatar"></div>';
      html += '<div>';
      html += '<div class="post-detail-author">' + esc(post.authorName) + '</div>';
      html += '<div class="post-detail-date">' + esc(post.publishDate) + '</div>';
      html += '</div>';
      html += '<span class="post-detail-category">' + esc(post.category) + '</span>';
      html += '</div>';
      html += '</div>';

      html += '<div class="post-detail-content">';
      html += '<p>' + esc(post.content) + '</p>';
      html += '</div>';

      html += '<div class="post-detail-actions">';
      html += '<button class="post-action-btn' + (isLiked ? ' liked' : '') + '" data-post-id="' + post.id + '" id="postLikeBtn">';
      html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      html += ' 喜欢 (' + formatNumber(post.likes || 0) + ')';
      html += '</button>';
      html += '<button class="post-action-btn' + (isFavorited ? ' favorited' : '') + '" data-post-id="' + post.id + '" id="postFavBtn">';
      html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
      html += ' 收藏';
      html += '</button>';
      html += '<button class="post-action-btn" id="postShareBtn">';
      html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';
      html += ' 分享';
      html += '</button>';
      html += '</div>';

      html += '<div class="comment-section">';
      html += '<h3>评论 (' + allComments.length + ')</h3>';

      allComments.forEach(function(c) {
        html += '<div class="comment-item">';
        html += '<div class="comment-header">';
        html += '<div class="comment-avatar"></div>';
        html += '<div>';
        html += '<div class="comment-author">' + esc(c.author) + '</div>';
        html += '<div class="comment-time">' + esc(c.time) + '</div>';
        html += '</div>';
        html += '</div>';
        html += '<p class="comment-text">' + esc(c.content) + '</p>';
        html += '</div>';
      });

      html += '<div class="comment-form">';
      html += '<textarea id="commentInput" placeholder="写下你的评论..."></textarea>';
      html += '<div class="comment-form-actions">';
      html += '<button class="btn btn-accent" id="submitComment">发表评论</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>';

      document.getElementById('postDetailContent').innerHTML = html;

      document.getElementById('postLikeBtn').addEventListener('click', function() {
        var liked = BCStorage.isInArray(BCStorage.KEYS.likedWorks, function(item) { return item.id === post.id; });
        if (liked) {
          BCStorage.removeFromArray(BCStorage.KEYS.likedWorks, function(item) { return item.id === post.id; });
          this.classList.remove('liked');
          showToast('已取消喜欢', 'info');
        } else {
          BCStorage.addToArray(BCStorage.KEYS.likedWorks, { id: post.id, time: Date.now() });
          this.classList.add('liked');
          showToast('已表示喜欢', 'success');
        }
      });

      document.getElementById('postFavBtn').addEventListener('click', function() {
        var faved = BCStorage.isInArray(BCStorage.KEYS.favoriteWorks, function(item) { return item.id === post.id; });
        if (faved) {
          BCStorage.removeFromArray(BCStorage.KEYS.favoriteWorks, function(item) { return item.id === post.id; });
          this.classList.remove('favorited');
          showToast('已取消收藏', 'info');
        } else {
          BCStorage.addToArray(BCStorage.KEYS.favoriteWorks, { id: post.id, time: Date.now() });
          this.classList.add('favorited');
          showToast('已收藏', 'success');
        }
      });

      document.getElementById('postShareBtn').addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function() {
            showToast('链接已复制到剪贴板', 'success');
          });
        } else {
          showToast('分享链接: ' + url, 'info');
        }
      });

      document.getElementById('submitComment').addEventListener('click', function() {
        var input = document.getElementById('commentInput');
        var content = input.value.trim();
        if (!content) {
          showToast('请输入评论内容', 'warning');
          return;
        }

        var commentsData = BCStorage.getItem(BCStorage.KEYS.comments_data, {});
        var key = 'post_' + post.id;
        if (!commentsData[key]) commentsData[key] = [];

        commentsData[key].push({
          id: 'cmt_' + Date.now(),
          content: content,
          time: Date.now(),
          author: '用户'
        });

        BCStorage.setItem(BCStorage.KEYS.comments_data, commentsData);
        input.value = '';
        showToast('评论发布成功', 'success');

        setTimeout(function() { location.reload(); }, 500);
      });

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
