<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社区 - BirdChain鸟链</title>
  <meta name="description" content="加入BirdChain鸟类爱好者社区，参与讨论、分享作品、交流观鸟经验。">
  <meta property="og:title" content="鸟类爱好者社区 - BirdChain鸟链">
  <meta property="og:description" content="鸟类爱好者交流社区，讨论区、问答、作品求评、地方站交流。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .community-hero {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin: 20px 0 32px;
      background: linear-gradient(135deg, #2D6A4F, #40916C);
      min-height: 260px;
      display: flex;
      align-items: center;
      padding: 48px;
    }
    .community-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(199, 165, 109, 0.15), transparent 60%);
      pointer-events: none;
    }
    .community-hero-content {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }
    .community-hero-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    .community-hero-content p {
      font-size: 1rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .community-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 28px;
      align-items: start;
    }
    .community-category-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      border-bottom: 2px solid var(--line-soft);
      padding-bottom: 12px;
    }
    .community-category-tab {
      padding: 8px 18px;
      border-radius: 20px 20px 0 0;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      transition: all var(--transition-fast);
    }
    .community-category-tab:hover,
    .community-category-tab.active {
      color: var(--brand-accent);
      border-bottom: 2px solid var(--brand-accent);
      margin-bottom: -14px;
      background: transparent;
    }
    .community-post-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .community-post-card:hover {
      border-color: var(--brand-accent);
      box-shadow: var(--shadow-sm);
    }
    .community-post-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .community-post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand-accent);
    }
    .community-post-author {
      font-weight: 600;
      font-size: 0.88rem;
    }
    .community-post-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .community-post-category {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--bg-soft);
      color: var(--text-secondary);
    }
    .community-post-card h5 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-strong);
    }
    .community-post-excerpt {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .community-post-stats {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .community-post-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .community-sidebar {
      position: sticky;
      top: 20px;
    }
    .community-sidebar-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }
    .community-sidebar-card h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .community-hot-post {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line-soft);
      cursor: pointer;
    }
    .community-hot-post:last-child { border-bottom: none; }
    .community-hot-post-rank {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .community-hot-post-rank.top { background: var(--brand-accent); color: #fff; }
    .community-hot-post-title {
      font-size: 0.85rem;
      line-height: 1.4;
      color: var(--text-strong);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .community-hot-post-likes {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .community-create-post {
      text-align: center;
    }
    .community-create-post .btn {
      width: 100%;
      margin-bottom: 12px;
    }
    @media (max-width: 991px) {
      .community-layout { grid-template-columns: 1fr; }
      .community-sidebar { position: static; }
    }
    @media (max-width: 767px) {
      .community-hero { padding: 32px 20px; min-height: 200px; }
      .community-hero-content h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>

      <div class="community-hero">
        <div class="community-hero-content">
          <h1>鸟类爱好者社区</h1>
          <p>与全国鸟类爱好者交流讨论，分享观鸟经验、摄影作品、保护行动——这里是属于每一位爱鸟人的家园。</p>
          <a href="/community/post-detail.html" class="btn btn-accent">发布帖子</a>
        </div>
      </div>

      <div class="community-layout">
        <div class="community-main">
          <div class="community-category-tabs" id="categoryTabs">
            <button class="community-category-tab active" data-category="all">全部帖子</button>
            <button class="community-category-tab" data-category="讨论区">讨论区</button>
            <button class="community-category-tab" data-category="问答">问答</button>
            <button class="community-category-tab" data-category="作品求评">作品求评</button>
            <button class="community-category-tab" data-category="地方站交流">地方站交流</button>
            <button class="community-category-tab" data-category="摄影伦理">摄影伦理</button>
            <button class="community-category-tab" data-category="观鸟活动">观鸟活动</button>
          </div>

          <div id="postList"></div>

          <div style="text-align:center;padding:24px 0;" id="loadMoreWrap">
            <button class="btn btn-outline" id="loadMoreBtn" style="display:none;">加载更多</button>
          </div>
        </div>

        <aside class="community-sidebar">
          <div class="community-sidebar-card community-create-post">
            <h4>加入讨论</h4>
            <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;">分享你的观鸟故事、摄影作品或保护行动</p>
            <button class="btn btn-accent" onclick="BirdChainInteractions.showToast('发布功能即将上线', 'info')">发布帖子</button>
          </div>

          <div class="community-sidebar-card">
            <h4>热门帖子</h4>
            <div id="hotPostsList"></div>
          </div>

          <div class="community-sidebar-card">
            <h4>社区统计</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;">
              <div><strong style="display:block;font-size:1.2rem;color:var(--brand-accent);">8,520</strong><span style="font-size:0.75rem;color:var(--text-secondary);">注册会员</span></div>
              <div><strong style="display:block;font-size:1.2rem;color:var(--brand-accent);">2,340</strong><span style="font-size:0.75rem;color:var(--text-secondary);">今日帖子</span></div>
              <div><strong style="display:block;font-size:1.2rem;color:var(--brand-accent);">156</strong><span style="font-size:0.75rem;color:var(--text-secondary);">活跃小组</span></div>
              <div><strong style="display:block;font-size:1.2rem;color:var(--brand-accent);">48,920</strong><span style="font-size:0.75rem;color:var(--text-secondary);">总帖子数</span></div>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('community'));
      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '社区', href: '/community/index.html' }
      ]);

      var posts = await loadData('communityPosts');
      var currentCategory = 'all';
      var displayCount = 8;

      function renderPosts() {
        var filtered = posts.slice();
        if (currentCategory !== 'all') {
          filtered = filtered.filter(function(p) { return p.category === currentCategory; });
        }
        var shown = filtered.slice(0, displayCount);
        var html = '';
        shown.forEach(function(p) {
          html += '<a href="/community/post-detail.html?id=' + p.id + '" class="community-post-card">';
          html += '<div class="community-post-card-header">';
          html += '<div class="community-post-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
          html += '<div>';
          html += '<div class="community-post-author">' + esc(p.author || '匿名用户') + '</div>';
          html += '<div class="community-post-time">' + esc(p.time || '') + '</div>';
          html += '</div>';
          html += '<span class="community-post-category">' + esc(p.category) + '</span>';
          html += '</div>';
          html += '<h5>' + esc(p.title) + '</h5>';
          html += '<p class="community-post-excerpt">' + esc(p.content || p.excerpt || '') + '</p>';
          html += '<div class="community-post-stats">';
          html += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg> ' + (p.likes || 0) + '</span>';
          html += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ' + (p.comments || 0) + '</span>';
          html += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> ' + (p.shares || 0) + '</span>';
          html += '</div>';
          html += '</a>';
        });
        if (!html) {
          html = BC.renderEmptyState('该分类暂无帖子');
        }
        document.getElementById('postList').innerHTML = html;

        var loadMoreBtn = document.getElementById('loadMoreBtn');
        if (displayCount < filtered.length) {
          loadMoreBtn.style.display = 'inline-block';
          loadMoreBtn.textContent = '加载更多 (' + (filtered.length - displayCount) + '条)';
        } else {
          loadMoreBtn.style.display = 'none';
        }
      }

      function renderHotPosts() {
        var sorted = posts.slice().sort(function(a, b) { return (b.likes || 0) - (a.likes || 0); });
        var top5 = sorted.slice(0, 5);
        var html = '';
        top5.forEach(function(p, i) {
          html += '<a href="/community/post-detail.html?id=' + p.id + '" class="community-hot-post">';
          html += '<span class="community-hot-post-rank' + (i < 3 ? ' top' : '') + '">' + (i + 1) + '</span>';
          html += '<div>';
          html += '<div class="community-hot-post-title">' + esc(p.title) + '</div>';
          html += '<div class="community-hot-post-likes">' + (p.likes || 0) + ' 赞</div>';
          html += '</div>';
          html += '</a>';
        });
        document.getElementById('hotPostsList').innerHTML = html;
      }

      renderPosts();
      renderHotPosts();

      document.getElementById('categoryTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.community-category-tab');
        if (!tab) return;
        currentCategory = tab.getAttribute('data-category');
        displayCount = 8;
        var tabs = this.querySelectorAll('.community-category-tab');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        renderPosts();
      });

      document.getElementById('loadMoreBtn').addEventListener('click', function() {
        displayCount += 8;
        renderPosts();
        window.scrollBy({ top: 200, behavior: 'smooth' });
      });

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
