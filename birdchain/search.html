<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索作品 - BirdChain鸟链</title>
  <meta name="description" content="在BirdChain鸟链搜索全球鸟类影像作品，发现精彩鸟类摄影、数字艺术和插画创作。">
  <meta property="og:title" content="搜索作品 - BirdChain鸟链">
  <meta property="og:description" content="在BirdChain鸟链搜索全球鸟类影像作品。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-search-page-header {
      padding: 28px 0 20px;
    }
    .bc-search-page-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-strong);
    }
    .bc-search-page-header .result-count {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .bc-search-input-large {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1.5px solid var(--line-soft);
      border-radius: 28px;
      padding: 8px 20px;
      gap: 10px;
      transition: border-color var(--transition-fast);
      max-width: 560px;
    }
    .bc-search-input-large:focus-within {
      border-color: var(--brand-accent);
    }
    .bc-search-input-large input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 1rem;
      color: var(--text-main);
      padding: 8px 0;
    }
    .bc-search-input-large input::placeholder {
      color: var(--neutral-soft);
    }
    .bc-search-input-large .search-icon {
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .bc-search-input-large button {
      padding: 8px 18px;
      border-radius: 20px;
      background: var(--brand-primary);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background var(--transition-fast);
    }
    .bc-search-input-large button:hover {
      background: var(--brand-primary-dark);
    }
    .bc-search-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin: 20px 0;
    }
    .bc-search-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .bc-search-tab {
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 500;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      color: var(--text-main);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .bc-search-tab:hover {
      border-color: var(--brand-accent);
      color: var(--brand-accent);
    }
    .bc-search-tab.active {
      background: var(--brand-primary);
      color: #fff;
      border-color: var(--brand-primary);
    }
    .bc-search-sort {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-soft);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition-fast);
    }
    .bc-search-sort:focus {
      border-color: var(--brand-accent);
    }
    .bc-search-results {
      min-height: 300px;
    }
    @media (max-width: 767px) {
      .bc-search-toolbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .bc-search-input-large {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div class="bc-search-page-header">
        <h2 id="searchTitle">搜索作品</h2>
        <p class="result-count" id="resultCount"></p>
      </div>

      <div class="bc-search-input-large">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="搜索作品、创作者、标签..." data-action="search" data-search-url="/search.html" />
        <button id="searchBtn" data-action="search-submit">搜索</button>
      </div>

      <div class="bc-search-toolbar">
        <div class="bc-search-tabs" id="categoryTabs">
          <button class="bc-search-tab active" data-category="">全部</button>
          <button class="bc-search-tab" data-category="摄影">摄影</button>
          <button class="bc-search-tab" data-category="数字艺术">数字艺术</button>
          <button class="bc-search-tab" data-category="插画">插画</button>
          <button class="bc-search-tab" data-category="AI创作">AI创作</button>
        </div>
        <select class="bc-search-sort" id="sortSelect">
          <option value="newest">最新发布</option>
          <option value="views">最多浏览</option>
          <option value="favorites">最多收藏</option>
        </select>
      </div>

      <div class="bc-search-results">
        <div class="grid-4" id="resultsGrid"></div>
        <div id="paginationContainer"></div>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BD = window.BirdChainData;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('search'));

      var urlParams = new URLSearchParams(window.location.search);
      var query = urlParams.get('q') || '';
      var searchInput = document.getElementById('searchInput');
      var searchTitle = document.getElementById('searchTitle');
      var resultCount = document.getElementById('resultCount');
      var resultsGrid = document.getElementById('resultsGrid');
      var paginationContainer = document.getElementById('paginationContainer');

      if (query) {
        searchInput.value = query;
        searchTitle.textContent = '搜索：' + query;
        document.title = '搜索：' + query + ' - BirdChain鸟链';
      }

      var currentCategory = '';
      var currentSort = 'newest';
      var currentPage = 1;
      var pageSize = 12;
      var allResults = [];

      var works = await BD.loadData('works');
      var creators = await BD.loadData('creators');
      var creatorMap = {};
      creators.forEach(function(c) { creatorMap[c.id] = c; });

      function mapWork(work) {
        var creator = creatorMap[work.creatorId] || {};
        var aspectMap = { '横图': '16/9', '竖图': '3/4', '方图': '1/1' };
        return {
          id: work.id,
          title: work.title,
          image: work.image,
          dataImg: work.dataImg || null,
          aspectRatio: aspectMap[work.orientation] || '4/3',
          author: creator.name || work.creator || '未知创作者',
          authorAvatar: creator.avatar || null,
          authorDataImg: creator.dataImg || null,
          likes: work.likes || 0,
          views: work.views || 0,
          price: work.basePrice || 0
        };
      }

      function filterAndSort() {
        var results = works.slice();

        if (query) {
          var q = query.toLowerCase().trim();
          results = results.filter(function(work) {
            return (work.title && work.title.toLowerCase().indexOf(q) !== -1) ||
                   (work.description && work.description.toLowerCase().indexOf(q) !== -1) ||
                   (work.tags && work.tags.some(function(t) { return t.toLowerCase().indexOf(q) !== -1 })) ||
                   (work.species && work.species.toLowerCase().indexOf(q) !== -1) ||
                   (work.category && work.category.toLowerCase().indexOf(q) !== -1);
          });
        }

        if (currentCategory) {
          results = results.filter(function(work) {
            return work.category === currentCategory;
          });
        }

        switch (currentSort) {
          case 'views':
            results.sort(function(a, b) { return (b.views || 0) - (a.views || 0) });
            break;
          case 'favorites':
            results.sort(function(a, b) { return (b.favorites || 0) - (a.favorites || 0) });
            break;
          case 'newest':
          default:
            results.sort(function(a, b) { return new Date(b.createdAt || 0) - new Date(a.createdAt || 0) });
            break;
        }

        allResults = results;
      }

      function renderPage() {
        filterAndSort();

        var totalResults = allResults.length;
        resultCount.textContent = '共找到 ' + totalResults + ' 件作品';

        var totalPages = Math.ceil(totalResults / pageSize);
        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

        var start = (currentPage - 1) * pageSize;
        var pageItems = allResults.slice(start, start + pageSize);

        if (pageItems.length === 0) {
          resultsGrid.innerHTML = '';
          var emptyMsg = query ? '没有找到与 "' + query + '" 相关的作品' : '暂无作品';
          resultsGrid.innerHTML = '<div style="grid-column:1/-1">' + BC.renderEmptyState(emptyMsg) + '</div>';
        } else {
          var html = '';
          pageItems.forEach(function(w) {
            html += BC.renderWorkCard(mapWork(w));
          });
          resultsGrid.innerHTML = html;
        }

        if (totalPages > 1) {
          paginationContainer.innerHTML = BC.renderPagination(currentPage, totalPages);
          initPagination();
        } else {
          paginationContainer.innerHTML = '';
        }

        BI.initLikeButtonStates();
        BI.initFavoriteButtonStates();
      }

      function initPagination() {
        paginationContainer.addEventListener('click', function(e) {
          var btn = e.target.closest('button[data-page]');
          if (!btn || btn.disabled) return;
          var page = parseInt(btn.getAttribute('data-page'));
          if (page >= 1 && page <= Math.ceil(allResults.length / pageSize)) {
            currentPage = page;
            renderPage();
            window.scrollTo({ top: 400, behavior: 'smooth' });
          }
        });
      }

      document.getElementById('categoryTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('[data-category]');
        if (!tab) return;
        currentCategory = tab.getAttribute('data-category');
        currentPage = 1;
        var tabs = document.querySelectorAll('#categoryTabs .bc-search-tab');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        renderPage();
      });

      document.getElementById('sortSelect').addEventListener('change', function() {
        currentSort = this.value;
        currentPage = 1;
        renderPage();
      });

      document.getElementById('searchBtn').addEventListener('click', function() {
        var newQuery = searchInput.value.trim();
        if (!newQuery) return;
        var newUrl = '/search.html?q=' + encodeURIComponent(newQuery);
        window.location.href = newUrl;
      });

      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          var newQuery = searchInput.value.trim();
          if (!newQuery) return;
          var newUrl = '/search.html?q=' + encodeURIComponent(newQuery);
          window.location.href = newUrl;
        }
      });

      app.insertAdjacentHTML('beforeend', BC.renderFooter());

      BI.initLikeButtons();
      BI.initFavoriteButtons();
      BI.initCartButtons();
      BI.initThemeToggle();
      BI.initMobileMenu();
      BI.initSearchBar();
      BI.updateCartBadge();

      renderPage();
    });
  </script>
</body>
</html>
