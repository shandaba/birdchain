<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>器材详情 - BirdChain鸟链</title>
  <meta name="description" content="查看鸟类摄影与观鸟装备的详细参数、评测和购买建议。">
  <meta property="og:title" content="器材详情 - BirdChain鸟链">
  <meta property="og:description" content="详细器材参数、专业评测与购买建议。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .product-detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      margin: 28px 0 40px;
      align-items: start;
    }
    .product-detail-img {
      aspect-ratio: 1/1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: 84px;
    }
    .product-detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-detail-info h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-strong);
    }
    .product-detail-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .product-detail-meta span {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .product-detail-meta .brand-badge {
      background: var(--bg-soft);
      padding: 3px 12px;
      border-radius: 16px;
      font-weight: 600;
      color: var(--brand-accent-dark);
    }
    .product-detail-meta .category-badge {
      background: var(--bg-soft);
      padding: 3px 12px;
      border-radius: 16px;
      font-size: 0.8rem;
    }
    .product-detail-price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 20px;
    }
    .product-specs-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }
    .product-specs-table tr {
      border-bottom: 1px solid var(--line-soft);
    }
    .product-specs-table td {
      padding: 10px 0;
      font-size: 0.88rem;
    }
    .product-specs-table td:first-child {
      color: var(--text-secondary);
      width: 120px;
    }
    .product-specs-table td:last-child {
      font-weight: 500;
      color: var(--text-strong);
    }
    .product-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .product-tag {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
      font-weight: 500;
    }
    .product-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .product-reviews {
      margin-bottom: 32px;
    }
    .product-review-item {
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .product-review-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .product-review-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--brand-accent-soft);
    }
    .product-review-author {
      font-weight: 600;
      font-size: 0.88rem;
    }
    .product-review-time {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .product-review-text {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .related-works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 767px) {
      .product-detail-layout { grid-template-columns: 1fr; gap: 24px; }
      .product-detail-img { position: static; }
      .related-works-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="productDetailContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('gear'));

      var params = new URLSearchParams(window.location.search);
      var gearId = params.get('id');

      if (!gearId) {
        document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
          { label: '摄影器材', href: '/gear/index.html' },
          { label: '器材详情' }
        ]);
        document.getElementById('productDetailContent').innerHTML = '<div class="section" style="text-align:center"><h2>未指定器材</h2><p style="color:var(--text-secondary)">请从器材列表选择一件器材查看</p><a href="/gear/index.html" class="btn btn-accent mt-2">返回器材列表</a></div>';
        app.insertAdjacentHTML('beforeend', BC.renderFooter());
        BI.initAll();
        return;
      }

      var gearData = await loadData('gear');
      var gear = findById(gearData, gearId);

      if (!gear) {
        document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
          { label: '摄影器材', href: '/gear/index.html' },
          { label: '器材详情' }
        ]);
        document.getElementById('productDetailContent').innerHTML = '<div class="section" style="text-align:center"><h2>器材不存在</h2><p style="color:var(--text-secondary)">未找到ID为 ' + esc(gearId) + ' 的器材</p><a href="/gear/index.html" class="btn btn-accent mt-2">返回器材列表</a></div>';
        app.insertAdjacentHTML('beforeend', BC.renderFooter());
        BI.initAll();
        return;
      }

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '摄影器材', href: '/gear/index.html' },
        { label: gear.name }
      ]);

      var worksData = [];
      if (gear.relatedWorks && gear.relatedWorks.length > 0) {
        try {
          var allWorks = await loadData('works');
          gear.relatedWorks.forEach(function(wId) {
            var w = findById(allWorks, wId);
            if (w) worksData.push(w);
          });
        } catch(e) {}
      }

      var gradientColors = [
        'linear-gradient(135deg, #2c3e50, #3498db)',
        'linear-gradient(135deg, #1B4332, #2D6A4F)',
        'linear-gradient(135deg, #1B4F72, #2980B9)',
        'linear-gradient(135deg, #457B9D, #A8DADC)',
        'linear-gradient(135deg, #6B4226, #8B6914)'
      ];

      var specsHtml = '';
      if (gear.specs) {
        Object.keys(gear.specs).forEach(function(key) {
          specsHtml += '<tr><td>' + esc(key) + '</td><td>' + esc(gear.specs[key]) + '</td></tr>';
        });
      }

      var reviews = [
        { author: '鸟类摄影大师', time: '2024-05-20', text: '使用了三个月，对焦速度和画质都非常出色，特别是在拍摄飞行中的鸟类时表现优异。' },
        { author: '自然观察者', time: '2024-04-15', text: '重量控制得很好，长时间手持拍摄也不会太累。防水性能在野外环境下非常可靠。' },
        { author: '观鸟爱好者', time: '2024-03-28', text: '性价比很高的一款器材，适合从入门到进阶的鸟类摄影爱好者使用。' }
      ];

      var html = '';

      html += '<div class="product-detail-layout">';

      html += '<div class="product-detail-img">';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: ' + gradientColors[Math.floor(Math.random() * gradientColors.length)] + '; width:100%; height:100%; object-fit:cover;" alt="' + esc(gear.name) + '">';
      html += '</div>';

      html += '<div class="product-detail-info">';
      html += '<h1>' + esc(gear.name) + '</h1>';
      html += '<div class="product-detail-meta">';
      html += '<span class="brand-badge">' + esc(gear.brand) + '</span>';
      html += '<span class="category-badge">' + esc(gear.category) + '</span>';
      html += '<span>' + esc(gear.type) + '</span>';
      html += '<span style="color:var(--brand-accent);">★ ' + (gear.rating || '0') + ' (' + (gear.reviewCount || 0) + '条评测)</span>';
      html += '</div>';

      html += '<div class="product-detail-price">¥' + (gear.price || 0).toLocaleString() + '</div>';

      html += '<div class="product-tags">';
      if (gear.suitableFor) {
        gear.suitableFor.forEach(function(tag) {
          html += '<span class="product-tag">' + esc(tag) + '</span>';
        });
      }
      html += '</div>';

      html += '<table class="product-specs-table">';
      html += '<tbody>' + specsHtml + '</tbody>';
      html += '</table>';

      html += '<div class="product-actions">';
      html += '<a href="/gear/review-detail.html?id=' + esc(gear.id) + '" class="btn btn-accent">查看评测</a>';
      html += '<a href="/gear/index.html" class="btn btn-ghost">返回器材列表</a>';
      html += '</div>';

      html += '<div class="product-reviews">';
      html += '<h3 style="font-size:1.15rem;font-weight:600;margin-bottom:16px;">摄影师评价</h3>';
      reviews.forEach(function(r) {
        html += '<div class="product-review-item">';
        html += '<div class="product-review-header">';
        html += '<div class="product-review-avatar"></div>';
        html += '<div>';
        html += '<div class="product-review-author">' + esc(r.author) + '</div>';
        html += '<div class="product-review-time">' + esc(r.time) + '</div>';
        html += '</div>';
        html += '</div>';
        html += '<p class="product-review-text">' + esc(r.text) + '</p>';
        html += '</div>';
      });
      html += '</div>';

      html += '</div>';
      html += '</div>';

      if (worksData.length > 0) {
        html += '<div class="section">';
        html += '<h2 class="section-title">关联作品</h2>';
        html += '<p class="section-subtitle">使用该器材拍摄的鸟类影像作品</p>';
        html += '<div class="related-works-grid">';
        worksData.forEach(function(w) {
          var mapped = {
            id: w.id,
            title: w.title,
            image: w.image,
            dataImg: w.dataImg || null,
            aspectRatio: w.orientation === '竖图' ? '3/4' : (w.orientation === '方图' ? '1/1' : '4/3'),
            author: w.creator || '未知创作者',
            authorAvatar: null,
            authorDataImg: null,
            likes: w.likes || 0,
            views: w.views || 0,
            price: w.basePrice || 0
          };
          html += BC.renderWorkCard(mapped);
        });
        html += '</div>';
        html += '</div>';
      }

      document.getElementById('productDetailContent').innerHTML = html;

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
