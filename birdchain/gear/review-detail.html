<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>器材评测 - BirdChain鸟链</title>
  <meta name="description" content="深度评测鸟类摄影与观鸟装备，提供专业的样张展示与优缺点分析。">
  <meta property="og:title" content="器材评测 - BirdChain鸟链">
  <meta property="og:description" content="专业器材深度评测，样张展示与优缺点分析。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .review-cover {
      aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin: 28px 0 32px;
    }
    .review-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .review-content {
      max-width: 800px;
    }
    .review-content h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-strong);
    }
    .review-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .review-meta-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .review-meta-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand-accent);
    }
    .review-rating-big {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      padding: 20px;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
    }
    .review-rating-big .stars {
      font-size: 1.6rem;
      color: var(--brand-accent);
    }
    .review-rating-big .score {
      font-size: 2rem;
      font-weight: 700;
      color: var(--brand-accent);
    }
    .review-body {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    .review-body p {
      margin-bottom: 16px;
    }
    .review-samples-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 28px 0;
    }
    .review-sample {
      aspect-ratio: 4/3;
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .review-sample img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .review-pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 28px 0;
    }
    .review-pros,
    .review-cons {
      padding: 24px;
      border-radius: var(--radius-md);
    }
    .review-pros {
      background: rgba(45, 106, 79, 0.1);
      border: 1px solid rgba(45, 106, 79, 0.2);
    }
    .review-cons {
      background: rgba(220, 53, 69, 0.06);
      border: 1px solid rgba(220, 53, 69, 0.15);
    }
    .review-pros h4 {
      color: #2D6A4F;
      font-size: 1.05rem;
      margin-bottom: 12px;
    }
    .review-cons h4 {
      color: var(--danger);
      font-size: 1.05rem;
      margin-bottom: 12px;
    }
    .review-pros ul,
    .review-cons ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .review-pros li,
    .review-cons li {
      padding: 6px 0;
      font-size: 0.88rem;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .review-pros li::before { content: '✓'; color: #2D6A4F; font-weight: 700; }
    .review-cons li::before { content: '✗'; color: var(--danger); font-weight: 700; }
    .review-related-gear {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .review-related-gear a {
      padding: 8px 18px;
      border-radius: 20px;
      background: var(--bg-soft);
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all var(--transition-fast);
    }
    .review-related-gear a:hover {
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
    }
    @media (max-width: 767px) {
      .review-pros-cons { grid-template-columns: 1fr; }
      .review-samples-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="reviewContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('gear'));

      var params = new URLSearchParams(window.location.search);
      var gearId = params.get('id') || params.get('gearId');

      var gear = null;
      var gearData = [];
      try { gearData = await loadData('gear'); } catch(e) {}

      if (gearId) {
        gear = findById(gearData, gearId);
      }

      var gearName = gear ? gear.name : '该器材';
      var gearBrand = gear ? gear.brand : '';

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '摄影器材', href: '/gear/index.html' },
        gear ? { label: gear.name, href: '/gear/product-detail.html?id=' + gearId } : null,
        { label: '评测详情' }
      ].filter(Boolean));

      var rating = gear ? (parseFloat(gear.rating) || 0) : 4;
      var fullStars = Math.floor(rating);
      var starsHtml = '';
      for (var i = 0; i < 5; i++) {
        if (i < fullStars) starsHtml += '<span style="color:var(--brand-accent);">★</span>';
        else starsHtml += '<span style="color:var(--line-soft);">★</span>';
      }

      var html = '';

      html += '<div class="review-cover">';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #1B4965, #2980B9); width:100%; height:100%; object-fit:cover;" alt="评测封面">';
      html += '</div>';

      html += '<div class="review-content">';
      html += '<h1>' + esc(gearName) + ' 深度评测</h1>';
      html += '<div class="review-meta">';
      html += '<div class="review-meta-author">';
      html += '<div class="review-meta-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
      html += '<span>资深鸟类摄影师 · 王大明</span>';
      html += '</div>';
      html += '<span>2025年4月15日</span>';
      html += '<span>阅读 8,520</span>';
      html += '</div>';

      html += '<div class="review-rating-big">';
      html += '<span class="score">' + rating + '</span>';
      html += '<span class="stars">' + starsHtml + '</span>';
      html += '<span style="font-size:0.9rem;color:var(--text-secondary);">推荐指数</span>';
      html += '</div>';

      html += '<div class="review-body">';
      html += '<p>' + esc(gearName) + ' 作为' + esc(gearBrand) + '在鸟类摄影领域推出的专业设备，自发布以来便受到广泛关注。经过两个月的深度使用，我们对其在野外拍摄、低光环境表现以及长时间使用的可靠性方面进行了全面评估。</p>';
      html += '<p>首先从外观和手感说起。' + esc(gearName) + ' 采用了镁合金机身框架，具备出色的防尘防滴性能，这对于户外鸟类摄影尤为重要。握持感扎实，即使搭配长焦镜头长时间手持拍摄也不会感到明显疲劳。</p>';
      html += '<p>在光学性能方面，' + esc(gearName) + ' 展现出了顶级水准。全开光圈下中心锐度出色，边缘画质也保持了很好的表现。色彩还原自然真实，没有明显的偏色倾向，这对于记录鸟类羽毛的丰富色彩非常关键。</p>';
      html += '<p>对焦系统是鸟类摄影的灵魂。' + esc(gearName) + ' 的自动对焦表现令人满意，鸟类识别追踪功能能够准确锁定飞翔中的鸟类，即使在复杂背景下也能保持稳定追踪。连拍速度达到了鸟类摄影的需求标准。</p>';
      html += '<p>在弱光条件下，高ISO表现可圈可点。ISO 6400以下的画质完全可以接受，这对于清晨和傍晚的黄金拍摄时段来说非常重要。结合优秀的防抖系统，在1/250s的快门速度下也能获得清晰的照片。</p>';
      html += '<p>电池续航方面，一次充满电可以支持一整天的拍摄，大约2000张以上的拍摄量。野外使用建议携带备用电池，以应对长时间的拍摄需求。</p>';
      html += '</div>';

      html += '<h3 style="margin-bottom:16px;">样张展示</h3>';
      html += '<div class="review-samples-grid">';
      var sampleGradients = [
        'linear-gradient(135deg, #2D6A4F, #40916C)',
        'linear-gradient(135deg, #1B4F72, #2980B9)',
        'linear-gradient(135deg, #6B4226, #8B6914)',
        'linear-gradient(135deg, #457B9D, #A8DADC)',
        'linear-gradient(135deg, #3A5A40, #588157)',
        'linear-gradient(135deg, #BC6C25, #DDA15E)'
      ];
      var sampleLabels = ['白鹭捕食', '翠鸟潜水', '丹顶鹤飞翔', '朱鹮栖息', '黑脸琵鹭觅食', '林鸟鸣叫'];
      for (var s = 0; s < 6; s++) {
        html += '<div class="review-sample">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: ' + sampleGradients[s] + '; width:100%; height:100%; object-fit:cover;" alt="' + sampleLabels[s] + '">';
        html += '</div>';
      }
      html += '</div>';

      html += '<div class="review-pros-cons">';
      html += '<div class="review-pros">';
      html += '<h4>优点</h4>';
      html += '<ul>';
      html += '<li>出色的光学性能，全开光圈锐度优异</li>';
      html += '<li>鸟类识别追踪准确率高，对焦快速可靠</li>';
      html += '<li>防尘防滴设计，适合野外恶劣环境</li>';
      html += '<li>优秀的防抖系统，手持拍摄出片率高</li>';
      html += '<li>色彩还原自然，鸟类羽毛细节丰富</li>';
      html += '</ul>';
      html += '</div>';
      html += '<div class="review-cons">';
      html += '<h4>缺点</h4>';
      html += '<ul>';
      html += '<li>价格较高，入门用户有一定门槛</li>';
      html += '<li>重量偏重，长时间携带略有负担</li>';
      html += '<li>电子取景器在高对比度场景有轻微延迟</li>';
      html += '</ul>';
      html += '</div>';
      html += '</div>';

      html += '<div class="review-related-gear">';
      html += '<span style="font-size:0.85rem;color:var(--text-secondary);">相关器材：</span>';
      gearData.slice(0, 5).forEach(function(g) {
        if (g.id !== gearId) {
          html += '<a href="/gear/review-detail.html?id=' + g.id + '">' + esc(g.name) + '</a>';
        }
      });
      html += '</div>';

      html += '</div>';

      document.getElementById('reviewContent').innerHTML = html;

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
