<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评测文章 - BirdChain鸟链</title>
  <meta name="description" content="鸟类摄影与观鸟装备深度评测，专业摄影师真实体验分享。">
  <meta property="og:title" content="器材评测 - BirdChain鸟链">
  <meta property="og:description" content="专业鸟类摄影器材深度评测，样张展示与优缺点分析。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .review-detail-header {
      margin: 28px 0 32px;
    }
    .review-detail-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-strong);
    }
    .review-detail-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .review-author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-soft);
    }
    .review-author-name {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .review-author-date {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .review-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
    }
    .review-star {
      width: 24px;
      height: 24px;
      color: var(--brand-accent);
    }
    .review-star.empty { color: var(--neutral-soft); }
    .review-rating-text {
      font-size: 1.1rem;
      font-weight: 600;
      margin-left: 8px;
      color: var(--brand-accent-dark);
    }
    .review-cover {
      aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 32px;
    }
    .review-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .review-samples {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 32px 0;
    }
    .review-sample {
      aspect-ratio: 3/2;
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .review-sample img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .review-sample-caption {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 6px;
      text-align: center;
    }
    .review-pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 32px 0;
    }
    .review-pros,
    .review-cons {
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    .review-pros h5,
    .review-cons h5 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .review-pros h5 { color: var(--success); }
    .review-cons h5 { color: var(--danger); }
    .review-pros ul,
    .review-cons ul {
      list-style: none;
      padding: 0;
    }
    .review-pros li,
    .review-cons li {
      padding: 6px 0;
      font-size: 0.88rem;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .review-pros li::before { content: '✓'; color: var(--success); font-weight: 700; }
    .review-cons li::before { content: '✗'; color: var(--danger); font-weight: 700; }
    .review-content {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-main);
      margin-bottom: 32px;
    }
    .review-content p {
      margin-bottom: 16px;
    }
    .review-related-gear {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 767px) {
      .review-detail-header h1 { font-size: 1.4rem; }
      .review-samples { grid-template-columns: 1fr; }
      .review-pros-cons { grid-template-columns: 1fr; }
      .review-related-gear { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbContainer"></div>
      <div id="reviewDetailContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('gear'));

      var params = new URLSearchParams(window.location.search);
      var gearId = params.get('id');

      var gearData = await loadData('gear');
      var gear = gearId ? findById(gearData, gearId) : null;

      if (!gear) {
        document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
          { label: '摄影器材', href: '/gear/index.html' },
          { label: '器材评测' }
        ]);
        document.getElementById('reviewDetailContent').innerHTML = '<div class="section" style="text-align:center"><h2>未指定评测器材</h2><p style="color:var(--text-secondary)">请从器材列表选择查看评测</p><a href="/gear/index.html" class="btn btn-accent mt-2">返回器材列表</a></div>';
        app.insertAdjacentHTML('beforeend', BC.renderFooter());
        BI.initAll();
        return;
      }

      document.getElementById('breadcrumbContainer').innerHTML = BC.renderBreadcrumb([
        { label: '摄影器材', href: '/gear/index.html' },
        { label: gear.name + ' 评测' }
      ]);

      var rating = gear.rating || 4.5;
      var fullStars = Math.floor(rating);
      var hasHalf = rating - fullStars >= 0.5;

      var starsHtml = '';
      for (var i = 0; i < 5; i++) {
        if (i < fullStars) {
          starsHtml += '<span class="review-star"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>';
        } else {
          starsHtml += '<span class="review-star empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>';
        }
      }

      var gradientColors = [
        'linear-gradient(135deg, #2c3e50, #3498db)',
        'linear-gradient(135deg, #1B4332, #2D6A4F)',
        'linear-gradient(135deg, #1B4F72, #2980B9)'
      ];

      var sampleGradients = [
        'linear-gradient(135deg, #457B9D, #A8DADC)',
        'linear-gradient(135deg, #3A5A40, #588157)',
        'linear-gradient(135deg, #BC6C25, #DDA15E)',
        'linear-gradient(135deg, #2D6A4F, #40916C)',
        'linear-gradient(135deg, #6C584C, #A98467)',
        'linear-gradient(135deg, #1A535C, #4ECDC4)'
      ];

      var relatedGear = gearData.filter(function(g) { return g.id !== gear.id; }).slice(0, 3);

      var html = '';

      html += '<div class="review-detail-header">';
      html += '<h1>' + esc(gear.name) + ' 深度评测</h1>';
      html += '<div class="review-detail-meta">';
      html += '<div class="review-author-avatar"></div>';
      html += '<div>';
      html += '<div class="review-author-name">专业评测团队</div>';
      html += '<div class="review-author-date">2024-06-01 · ' + esc(gear.brand) + ' · ' + esc(gear.type) + '</div>';
      html += '</div>';
      html += '</div>';
      html += '<div class="review-stars">' + starsHtml + '<span class="review-rating-text">' + (rating || '0') + '/5.0</span></div>';
      html += '</div>';

      html += '<div class="review-cover">';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: ' + gradientColors[0] + '; width:100%; height:100%; object-fit:cover;" alt="' + esc(gear.name) + '">';
      html += '</div>';

      html += '<div class="review-samples">';
      for (var s = 0; s < 6; s++) {
        html += '<div>';
        html += '<div class="review-sample">';
        html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: ' + sampleGradients[s] + '; width:100%; height:100%; object-fit:cover;" alt="样张 ' + (s + 1) + '">';
        html += '</div>';
        html += '<div class="review-sample-caption">样张 ' + (s + 1) + '：' + esc(gear.name) + ' 实拍效果</div>';
        html += '</div>';
      }
      html += '</div>';

      html += '<div class="review-pros-cons">';
      html += '<div class="review-pros">';
      html += '<h5>优点</h5>';
      html += '<ul>';
      html += '<li>卓越的光学素质，画质锐利清晰</li>';
      html += '<li>快速精准的自动对焦系统</li>';
      html += '<li>优秀的防水防尘性能</li>';
      html += '<li>人体工学设计，长时间使用舒适</li>';
      html += '<li>优秀的色彩还原能力</li>';
      html += '</ul>';
      html += '</div>';
      html += '<div class="review-cons">';
      html += '<h5>缺点</h5>';
      html += '<ul>';
      html += '<li>价格较高，预算有限的用户需斟酌</li>';
      html += '<li>重量偏重，长时间手持需要适应</li>';
      html += '<li>配件价格同样不菲</li>';
      html += '</ul>';
      html += '</div>';
      html += '</div>';

      html += '<div class="review-content">';
      html += '<p>' + esc(gear.name) + ' 作为' + esc(gear.brand) + '旗下的' + esc(gear.type) + '，在鸟类摄影和观鸟领域有着出色的表现。经过我们团队为期一个月的实地测试，从湿地到山地、从清晨到黄昏，这款器材在各种复杂环境下都展现了令人满意的性能。</p>';
      html += '<p>在画质方面，' + esc(gear.name) + ' 的表现令人印象深刻。无论是翠鸟高速俯冲的瞬间，还是丹顶鹤在晨雾中翩翩起舞的优雅姿态，这款器材都能精准捕捉每一个精彩细节。色彩还原自然准确，边缘锐度出色。</p>';
      html += '<p>在对焦速度方面，该器材配备了先进的自动对焦系统，能够快速锁定移动中的鸟类目标。即使在光线较暗的林间环境中，对焦表现依然稳定可靠。这对于拍摄飞行中的猛禽或快速移动的小型鸟类至关重要。</p>';
      html += '<p>综合来看，' + esc(gear.name) + ' 是一款非常值得推荐的' + esc(gear.category) + '器材。虽然价格不菲，但其出色的性能和可靠的品质使其成为专业鸟类摄影师和严肃观鸟爱好者的理想选择。对于预算充足的用户，这无疑是一笔值得的投资。</p>';
      html += '</div>';

      html += '<div class="section">';
      html += '<h2 class="section-title">相关器材</h2>';
      html += '<p class="section-subtitle">你可能也感兴趣的器材</p>';
      html += '<div class="review-related-gear">';
      relatedGear.forEach(function(g) {
        html += '<a href="/gear/review-detail.html?id=' + g.id + '" class="gear-card" style="padding:20px;text-align:left;">';
        html += '<h5 style="font-size:0.95rem;margin-bottom:6px;">' + esc(g.name) + ' 评测</h5>';
        html += '<p style="font-size:0.82rem;color:var(--text-secondary);">' + esc(g.brand) + ' · ' + esc(g.type) + ' · ★ ' + (g.rating || '0') + '</p>';
        html += '<span style="font-size:0.85rem;color:var(--brand-accent);margin-top:8px;display:inline-block;">查看评测 →</span>';
        html += '</a>';
      });
      html += '</div>';
      html += '</div>';

      document.getElementById('reviewDetailContent').innerHTML = html;

      app.insertAdjacentHTML('beforeend', BC.renderFooter());
      BI.initAll();
    });
  </script>
</body>
</html>
