<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdChain鸟链 - 全球鸟类影像与创作平台</title>
  <meta name="description" content="BirdChain鸟链是全球领先的鸟类影像创作与版权交易平台，汇聚全球鸟类摄影师、数字艺术家和自然保护者，探索鸟类世界的无限精彩。">
  <meta property="og:title" content="BirdChain鸟链 - 全球鸟类影像与创作平台">
  <meta property="og:description" content="探索鸟类世界的无限精彩，发现全球最优秀的鸟类影像作品。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-newsletter-banner {
      background: linear-gradient(135deg, #16395C, #1B4F72);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      text-align: center;
      color: #fff;
      margin: 60px 0;
    }
    .bc-newsletter-banner h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .bc-newsletter-banner p {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-bottom: 24px;
    }
    .bc-newsletter-banner form {
      display: flex;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
    }
    .bc-newsletter-banner input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .bc-newsletter-banner input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .bc-newsletter-banner input:focus {
      border-color: var(--brand-accent);
    }
    .bc-newsletter-banner button {
      padding: 12px 28px;
      border-radius: 28px;
      background: var(--brand-accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background var(--transition-fast);
    }
    .bc-newsletter-banner button:hover {
      background: var(--brand-accent-dark);
    }
    .bc-lab-cta {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(135deg, #1B4332, #2D6A4F, #40916C);
      padding: 56px 48px;
      text-align: center;
      color: #fff;
      margin: 60px 0;
      position: relative;
    }
    .bc-lab-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(199, 165, 109, 0.15), transparent 60%);
      pointer-events: none;
    }
    .bc-lab-cta h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      position: relative;
    }
    .bc-lab-cta p {
      font-size: 1.05rem;
      opacity: 0.88;
      max-width: 560px;
      margin: 0 auto 28px;
      position: relative;
      line-height: 1.7;
    }
    .bc-lab-cta .btn {
      position: relative;
      font-size: 1.05rem;
      padding: 14px 36px;
      border-radius: 28px;
    }
    .bc-lab-features {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 32px;
      position: relative;
      flex-wrap: wrap;
    }
    .bc-lab-feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      opacity: 0.82;
    }
    .bc-lab-feature svg {
      flex-shrink: 0;
    }
    .bc-section-more {
      text-align: center;
      margin-top: 28px;
    }
    @media (max-width: 767px) {
      .bc-newsletter-banner {
        padding: 32px 20px;
        margin: 40px 0;
      }
      .bc-newsletter-banner form {
        flex-direction: column;
      }
      .bc-lab-cta {
        padding: 40px 24px;
        margin: 40px 0;
      }
      .bc-lab-cta h2 { font-size: 1.4rem; }
      .bc-lab-features { gap: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="heroContainer"></div>

      <div class="section">
        <div class="bc-category-chips" id="categoryChips"></div>
      </div>

      <section class="section" id="hotWorksSection">
        <div class="section-header">
          <div>
            <h2 class="section-title">热门作品</h2>
            <p class="section-subtitle">编辑精选的鸟类影像佳作</p>
          </div>
          <a href="/discover.html" class="btn btn-ghost">查看全部 &rarr;</a>
        </div>
        <div class="grid-4" id="hotWorksGrid"></div>
      </section>

      <section class="section" id="creatorsSection">
        <div class="section-header">
          <div>
            <h2 class="section-title">推荐摄影师</h2>
            <p class="section-subtitle">全球顶尖鸟类影像创作者</p>
          </div>
          <a href="/creators.html" class="btn btn-ghost">查看全部 &rarr;</a>
        </div>
        <div class="grid-4" id="creatorsGrid"></div>
      </section>

      <section class="section" id="stationsSection">
        <div class="section-header">
          <div>
            <h2 class="section-title">全球地方站</h2>
            <p class="section-subtitle">探索世界各地的鸟类观察站</p>
          </div>
          <a href="/stations.html" class="btn btn-ghost">查看全部 &rarr;</a>
        </div>
        <div class="grid-4" id="stationsGrid"></div>
      </section>

      <section class="section" id="topicsSection">
        <div class="section-header">
          <div>
            <h2 class="section-title">专题 / 深度分析</h2>
            <p class="section-subtitle">深入了解鸟类世界的精彩故事</p>
          </div>
          <a href="/topics.html" class="btn btn-ghost">查看全部 &rarr;</a>
        </div>
        <div class="grid-3" id="topicsGrid"></div>
      </section>

      <div class="bc-lab-cta" id="labCta">
        <h2>鸟类视觉实验室</h2>
        <p>运用AI技术探索鸟类艺术的无限可能。从智能生成到风格迁移，释放你的创意，创作独一无二的鸟类视觉作品。</p>
        <a href="/lab/create.html" class="btn btn-accent btn-lg">开始创作</a>
        <div class="bc-lab-features">
          <div class="bc-lab-feature">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span>AI智能生成</span>
          </div>
          <div class="bc-lab-feature">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>风格迁移</span>
          </div>
          <div class="bc-lab-feature">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <span>无限创意</span>
          </div>
        </div>
      </div>

      <section class="section" id="merchSection">
        <div class="section-header">
          <div>
            <h2 class="section-title">创作周边</h2>
            <p class="section-subtitle">将鸟类影像融入日常生活</p>
          </div>
          <a href="/merch/index.html" class="btn btn-accent">进入创作周边</a>
        </div>
        <div class="grid-4" id="merchGrid"></div>
      </section>

      <div class="bc-newsletter-banner">
        <h3>订阅 BirdChain 新闻通讯</h3>
        <p>获取最新鸟类影像资讯、创作灵感和平台动态，每周精选内容直达你的邮箱。</p>
        <form data-action="newsletter-form">
          <input type="email" placeholder="输入你的邮箱地址" required />
          <button type="submit">立即订阅</button>
        </form>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var app = document.getElementById('app');
      var BC = window.BirdChainComponents;
      var BD = window.BirdChainData;
      var BI = window.BirdChainInteractions;

      app.insertAdjacentHTML('afterbegin', BC.renderHeader('home'));

      var heroSlides = await BD.loadData('heroSlides');
      heroSlides.forEach(function(slide) {
        if (slide.subtitle && typeof slide.subtitle === 'object') {
          slide.subtitle = slide.subtitle.author + ' · ' + slide.subtitle.country;
        }
      });
      var heroContainer = document.getElementById('heroContainer');
      heroContainer.innerHTML = BC.renderHeroSlider(heroSlides);

      renderCategoryChips();

      var works = await BD.loadData('works');
      var creators = await BD.loadData('creators');
      var stations = await BD.loadData('stations');
      var topics = await BD.loadData('topics');
      var products = await BD.loadData('products');

      var creatorMap = {};
      creators.forEach(function(c) { creatorMap[c.id] = c; });

      renderHotWorks(works, creatorMap);
      renderCreators(creators);
      renderStations(stations);
      renderTopics(topics);
      renderMerch(products);

      app.insertAdjacentHTML('beforeend', BC.renderFooter());

      BI.initLikeButtons();
      BI.initFavoriteButtons();
      BI.initFollowButtons();
      BI.initCartButtons();
      BI.initNewsletterForm();
      BI.initThemeToggle();
      BI.initMobileMenu();
      BI.initSearchBar();
      BI.updateCartBadge();
    });

    function renderCategoryChips() {
      var categories = [
        { name: '野生鸟类', tag: '野生' },
        { name: '鸟类肖像', tag: '肖像' },
        { name: '飞羽瞬间', tag: '飞羽' },
        { name: '栖息地', tag: '栖息地' },
        { name: '鸟类行为', tag: '行为' },
        { name: '城市鸟类', tag: '城市' },
        { name: '濒危保护', tag: '濒危' },
        { name: '鸟类文化', tag: '文化' },
        { name: '全部分类', tag: '' }
      ];
      var html = '';
      categories.forEach(function(cat) {
        html += '<a href="/discover.html' + (cat.tag ? '?category=' + encodeURIComponent(cat.tag) : '') + '" class="bc-category-chip">' + cat.name + '</a>';
      });
      document.getElementById('categoryChips').innerHTML = html;
    }

    function mapWork(work, creatorMap) {
      var creator = creatorMap[work.creatorId] || {};
      var aspectMap = { '横图': '16/9', '竖图': '3/4', '方图': '1/1' };
      return {
        id: work.id,
        title: work.title,
        image: work.image,
        dataImg: work.dataImg || null,
        aspectRatio: aspectMap[work.orientation] || '4/3',
        author: creator.name || work.creator || '未知创作者',
        authorAvatar: creator.avatar || null,
        authorDataImg: creator.dataImg || null,
        likes: work.likes || 0,
        views: work.views || 0,
        price: work.basePrice || 0
      };
    }

    function renderHotWorks(works, creatorMap) {
      var sorted = works.slice().sort(function(a, b) { return (b.views || 0) - (a.views || 0) });
      var top8 = sorted.slice(0, 8);
      var html = '';
      top8.forEach(function(w) {
        html += BC.renderWorkCard(mapWork(w, creatorMap));
      });
      document.getElementById('hotWorksGrid').innerHTML = html;
    }

    function renderCreators(creators) {
      var sorted = creators.slice().sort(function(a, b) { return (b.followers || 0) - (a.followers || 0) });
      var top4 = sorted.slice(0, 4);
      var html = '';
      top4.forEach(function(c) {
        var mapped = {
          id: c.id,
          name: c.name,
          avatar: c.avatar,
          dataImg: c.dataImg || null,
          verified: c.verified,
          specialty: (c.specialties || []).join(' / '),
          works: c.works || 0,
          followers: c.followers || 0
        };
        html += BC.renderCreatorCard(mapped);
      });
      document.getElementById('creatorsGrid').innerHTML = html;
    }

    function renderStations(stations) {
      var top4 = stations.slice(0, 4);
      var html = '';
      top4.forEach(function(s) {
        var mapped = {
          id: s.id,
          name: s.name,
          image: s.cover || s.image,
          dataImg: s.dataImg || null,
          region: s.region + ' · ' + s.country,
          works: s.workCount || 0,
          creators: s.creatorCount || 0
        };
        html += BC.renderStationCard(mapped);
      });
      document.getElementById('stationsGrid').innerHTML = html;
    }

    function renderTopics(topics) {
      var top3 = topics.slice(0, 3);
      var html = '';
      top3.forEach(function(t) {
        var mapped = {
          id: t.id,
          title: t.title,
          image: t.cover || t.image,
          dataImg: t.dataImg || null,
          articles: t.articleCount || 0,
          views: t.views || 0
        };
        html += BC.renderTopicCard(mapped);
      });
      document.getElementById('topicsGrid').innerHTML = html;
    }

    function renderMerch(products) {
      var top4 = products.slice(0, 4);
      var html = '';
      top4.forEach(function(p) {
        var mapped = {
          id: p.id,
          title: p.name,
          image: p.cover || p.image,
          dataImg: p.dataImg || null,
          category: p.category || '',
          price: p.price || 0
        };
        html += BC.renderProductCard(mapped);
      });
      document.getElementById('merchGrid').innerHTML = html;
    }
  </script>
</body>
</html>
