<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸟种详情 - BirdChain鸟链</title>
  <meta name="description" content="查看鸟类物种详细信息，包括分布、栖息地、迁徙路线和保护等级。">
  <meta property="og:title" content="鸟种详情 - BirdChain鸟链">
  <meta property="og:description" content="查看鸟类物种详细信息。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-species-hero {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin: 16px 0 28px;
    }
    .bc-species-hero img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .bc-species-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7,27,45,0.85), rgba(7,27,45,0.1));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px;
      color: #fff;
    }
    .bc-species-hero-overlay h1 {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .bc-species-name-en {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 2px;
    }
    .bc-species-name-sci {
      font-size: 1rem;
      font-style: italic;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .bc-conservation-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .bc-conservation-lc { background: #2F7D51; color: #fff; }
    .bc-conservation-nt { background: #B89459; color: #fff; }
    .bc-conservation-vu { background: #D4A373; color: #fff; }
    .bc-conservation-en { background: #B45A4A; color: #fff; }
    .bc-conservation-cr { background: #8B0000; color: #fff; }
    .bc-species-info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .bc-species-info-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
    }
    .bc-species-info-card h4 {
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bc-species-info-card p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .bc-dist-map {
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 32px;
    }
    .bc-dist-map h4 {
      margin-bottom: 12px;
    }
    .bc-dist-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .bc-dist-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
      font-weight: 500;
    }
    .bc-related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .bc-topic-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      transition: all var(--transition-fast);
    }
    .bc-topic-link:hover {
      background: var(--brand-accent-soft);
    }
    .bc-topic-link span {
      font-weight: 500;
    }
    .bc-product-mini {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 10px;
    }
    .bc-product-mini-img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .bc-product-mini-info h5 {
      font-size: 0.9rem;
    }
    .bc-product-mini-info span {
      font-size: 0.78rem;
      color: var(--brand-accent);
      font-weight: 600;
    }
    @media (max-width: 767px) {
      .bc-species-info-grid { grid-template-columns: 1fr; }
      .bc-related-grid { grid-template-columns: repeat(2, 1fr); }
      .bc-species-hero-overlay h1 { font-size: 1.5rem; }
      .bc-species-hero-overlay { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbTarget"></div>
      <div id="pageContent"></div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      BirdChainComponents.renderHeader('stations');
      BirdChainComponents.renderFooter();
      BirdChainInteractions.initAll();

      var params = new URLSearchParams(window.location.search);
      var speciesId = params.get('id') || 'species-001';

      var species = null;
      try { species = await getSpeciesById(speciesId); } catch(e) { console.error(e); }

      if (!species) {
        document.getElementById('pageContent').innerHTML = '<div class="bc-empty-state" style="padding:80px 20px;"><h3>鸟种未找到</h3><p>请检查链接是否正确</p></div>';
        document.getElementById('breadcrumbTarget').innerHTML = BirdChainComponents.renderBreadcrumb([
          { label: '全球地方站', href: 'index.html' }, { label: '鸟种详情' }
        ]);
        return;
      }

      document.title = species.nameCn + ' - BirdChain鸟链';
      document.getElementById('breadcrumbTarget').innerHTML = BirdChainComponents.renderBreadcrumb([
        { label: '全球地方站', href: 'index.html' }, { label: species.nameCn }
      ]);

      var conservationClass = '';
      switch(species.conservation) {
        case '无危': conservationClass = 'bc-conservation-lc'; break;
        case '近危': conservationClass = 'bc-conservation-nt'; break;
        case '易危': conservationClass = 'bc-conservation-vu'; break;
        case '濒危': conservationClass = 'bc-conservation-en'; break;
        case '极危': conservationClass = 'bc-conservation-cr'; break;
        default: conservationClass = 'bc-conservation-lc';
      }

      var works = [];
      var topics = [];
      var products = [];
      try {
        works = await loadData('works');
        topics = await loadData('topics');
        products = await loadData('products');
      } catch(e) { console.error(e); }

      var relatedWorks = works.filter(function(w) {
        return species.featuredWorks && species.featuredWorks.indexOf(w.id) !== -1;
      });

      var relatedTopics = [];
      if (topics && topics.length > 0) {
        relatedTopics = topics.filter(function(t) {
          return t.tags && t.tags.some(function(tag) { return tag === species.nameCn; });
        }).slice(0, 4);
      }
      if (relatedTopics.length === 0) {
        relatedTopics = [
          { id: 'topic-001', title: '湿地鸟类保护与栖息地恢复' },
          { id: 'topic-002', title: '候鸟迁徙路线研究最新进展' },
          { id: 'topic-003', title: '中国濒危鸟类保护现状报告' }
        ];
      }

      var relatedProducts = [];
      if (products && products.length > 0) {
        relatedProducts = products.filter(function(p) {
          return p.tags && p.tags.some(function(tag) { return tag === species.nameCn; });
        }).slice(0, 4);
      }
      if (relatedProducts.length === 0) {
        relatedProducts = [
          { id: 'prod-001', title: species.nameCn + '主题马克杯', price: 68, image: '' },
          { id: 'prod-002', title: species.nameCn + '图鉴手账本', price: 45, image: '' },
          { id: 'prod-003', title: species.nameCn + '艺术版画', price: 198, image: '' },
          { id: 'prod-004', title: species.nameCn + 'T恤（生态棉）', price: 128, image: '' }
        ];
      }

      var html = '';

      html += '<div class="bc-species-hero">';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #1B4F72, #2980B9); width:100%; aspect-ratio:16/9; object-fit:cover;" alt="' + esc(species.nameCn) + '">';
      html += '<div class="bc-species-hero-overlay">';
      html += '<h1>' + esc(species.nameCn) + '</h1>';
      html += '<div class="bc-species-name-en">' + esc(species.nameEn) + '</div>';
      html += '<div class="bc-species-name-sci">' + esc(species.scientificName) + '</div>';
      html += '<span class="bc-conservation-badge ' + conservationClass + '">' + esc(species.conservation) + '</span>';
      html += '</div></div>';

      html += '<div class="bc-species-info-grid">';
      html += '<div class="bc-species-info-card"><h4>📖 物种简介</h4><p>' + esc(species.description || '暂无描述') + '</p></div>';
      html += '<div class="bc-species-info-card"><h4>🌿 栖息地</h4><p>' + esc(species.habitat || '暂无数据') + '</p></div>';
      html += '<div class="bc-species-info-card"><h4>✈️ 迁徙信息</h4><p>' + esc(species.migrationInfo || '暂无迁徙数据') + '</p></div>';
      html += '<div class="bc-species-info-card"><h4>🛡️ 保护等级</h4><p>IUCN保护等级：<strong>' + esc(species.conservation) + '</strong></p><p style="margin-top:8px;">该物种需关注栖息地保护，减少人为干扰。</p></div>';
      html += '</div>';

      html += '<div class="bc-dist-map">';
      html += '<h4>🗺️ 分布地图</h4>';
      html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #457B9D, #A8DADC); width:100%; aspect-ratio:21/9; object-fit:cover; border-radius:8px;" alt="分布地图">';
      html += '<p style="margin-top:12px;font-size:0.88rem;color:var(--text-secondary);">' + esc(species.nameCn) + '主要分布于以下区域：</p>';
      html += '<div class="bc-dist-tags">';
      if (species.distribution) {
        species.distribution.forEach(function(d) {
          html += '<span class="bc-dist-tag">' + esc(d) + '</span>';
        });
      }
      html += '</div>';
      html += '</div>';

      html += '<div class="bc-section-block">';
      html += '<div class="section-header"><h3 class="section-title">📷 相关作品</h3></div>';
      if (relatedWorks.length > 0) {
        html += '<div class="bc-related-grid">';
        relatedWorks.forEach(function(w) {
          html += '<div class="bc-species-mini-card">';
          html += '<div class="bc-species-mini-card-img">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #2a5c4a, #1a3a2a); width:100%; aspect-ratio:4/3; object-fit:cover;" alt="' + esc(w.title) + '">';
          html += '</div>';
          html += '<div class="bc-species-mini-card-body">';
          html += '<h5>' + esc(w.title) + '</h5>';
          html += '<span>' + esc(w.category || '') + ' · ' + formatNumber(w.likes || 0) + ' 喜欢</span>';
          html += '</div></div>';
        });
        html += '</div>';
      } else {
        html += '<p class="text-secondary">暂无相关作品</p>';
      }
      html += '</div>';

      html += '<div class="bc-section-block">';
      html += '<div class="section-header"><h3 class="section-title">📝 相关专题</h3></div>';
      if (relatedTopics.length > 0) {
        relatedTopics.forEach(function(t) {
          html += '<a href="/topics/topic-detail.html?id=' + esc(t.id) + '" class="bc-topic-link"><span>' + esc(t.title) + '</span>' + ARROW_RIGHT_SVG + '</a>';
        });
      } else {
        html += '<p class="text-secondary">暂无相关专题</p>';
      }
      html += '</div>';

      html += '<div class="bc-section-block">';
      html += '<div class="section-header"><h3 class="section-title">🛍️ 相关周边</h3></div>';
      if (relatedProducts.length > 0) {
        relatedProducts.forEach(function(p) {
          html += '<div class="bc-product-mini">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="bc-product-mini-img" style="background: linear-gradient(135deg, #D4A373, #FAEDCD);" alt="' + esc(p.title) + '">';
          html += '<div class="bc-product-mini-info"><h5>' + esc(p.title) + '</h5><span>' + formatPrice(p.price) + '</span></div>';
          html += '<button class="btn btn-sm btn-outline" data-action="add-to-cart" data-item-id="' + esc(p.id) + '" data-item-name="' + esc(p.title) + '" data-item-price="' + (p.price || 0) + '" data-item-type="product" style="margin-left:auto;">加入购物车</button>';
          html += '</div>';
        });
      } else {
        html += '<p class="text-secondary">暂无相关周边</p>';
      }
      html += '</div>';

      document.getElementById('pageContent').innerHTML = html;

      BirdChainInteractions.initCartButtons();
    });
  </script>
</body>
</html>
