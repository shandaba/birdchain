<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球地方站 - BirdChain鸟链</title>
  <meta name="description" content="探索BirdChain全球地方站网络，覆盖世界各主要生态区域的鸟类观测与保护站点。加入地方站，参与鸟类监测与保护。">
  <meta property="og:title" content="全球地方站 - BirdChain鸟链">
  <meta property="og:description" content="探索BirdChain全球地方站网络，覆盖世界各主要生态区域的鸟类观测与保护站点。">
  <meta property="og:image" content="/assets/images/logos/logo-mark.svg">
  <link rel="icon" href="/assets/images/logos/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .bc-stations-hero {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 280px;
      margin: 16px 0 28px;
    }
    .bc-stations-hero-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-stations-hero-content {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 27, 45, 0.85), rgba(7, 27, 45, 0.2));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px;
      color: #fff;
    }
    .bc-stations-hero-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .bc-stations-hero-content p {
      font-size: 0.95rem;
      opacity: 0.85;
      max-width: 600px;
      line-height: 1.7;
    }
    .bc-map-area {
      background: var(--bg-soft);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 32px;
    }
    .bc-map-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .bc-map-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 20px;
      cursor: pointer;
      transition: all var(--transition-normal);
      text-align: center;
    }
    .bc-map-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--brand-accent);
    }
    .bc-map-card.active {
      border-color: var(--brand-accent);
      background: var(--brand-accent-soft);
    }
    .bc-map-card-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .bc-map-card-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-strong);
      margin-bottom: 4px;
    }
    .bc-map-card-count {
      font-size: 0.8rem;
      color: var(--brand-accent);
      font-weight: 500;
    }
    .bc-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .bc-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
    }
    .bc-stat-card .bc-stat-num {
      font-size: 2rem;
      font-weight: 700;
      color: var(--brand-accent);
      margin-bottom: 4px;
    }
    .bc-stat-card .bc-stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .bc-hot-section {
      margin-bottom: 32px;
    }
    .bc-hot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .bc-hot-card {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 3/2;
    }
    .bc-hot-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bc-hot-card-body {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 27, 45, 0.8), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      color: #fff;
    }
    .bc-hot-card-body h4 {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .bc-hot-card-body span {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .bc-filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .bc-filter-chip {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      background: var(--bg-soft);
      color: var(--text-secondary);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all var(--transition-fast);
    }
    .bc-filter-chip:hover {
      color: var(--brand-accent);
      border-color: var(--brand-accent-soft);
    }
    .bc-filter-chip.active {
      background: var(--brand-accent);
      color: #fff;
      border-color: var(--brand-accent);
    }
    .bc-cta-banner {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-deep));
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      color: #fff;
      margin-top: 40px;
    }
    .bc-cta-banner h3 {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .bc-cta-banner p {
      opacity: 0.85;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .bc-cta-banner .btn-accent {
      padding: 12px 36px;
      font-size: 1rem;
    }
    .bc-station-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .bc-empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .bc-empty-state svg {
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .bc-station-card-stats-row {
      display: flex;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .bc-station-card-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--brand-accent-soft);
      color: var(--brand-accent-dark);
      margin-bottom: 6px;
    }
    @media (max-width: 767px) {
      .bc-map-grid { grid-template-columns: repeat(2, 1fr); }
      .bc-stats-row { grid-template-columns: repeat(2, 1fr); }
      .bc-hot-grid { grid-template-columns: 1fr; }
      .bc-stations-hero { height: 200px; }
      .bc-stations-hero-content h1 { font-size: 1.5rem; }
      .bc-stations-hero-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="container">
      <div id="breadcrumbTarget"></div>
      <div class="bc-stations-hero">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
             style="background: linear-gradient(135deg, #1B4332, #2D6A4F); width:100%; height:100%; object-fit:cover;"
             alt="全球地方站">
        <div class="bc-stations-hero-content">
          <h1>全球地方站</h1>
          <p>BirdChain全球地方站网络覆盖世界各主要生态区域，由当地鸟类爱好者和专业研究者共同运营，致力于鸟类观测、栖息地保护和公众教育。</p>
        </div>
      </div>

      <div class="bc-map-area">
        <h3 style="margin-bottom:16px;color:var(--text-strong);">🌍 全球观测网络</h3>
        <div class="bc-map-grid" id="regionMapGrid"></div>
      </div>

      <div class="bc-stats-row" id="statsRow"></div>

      <div class="bc-hot-section">
        <div class="section-header">
          <h3 class="section-title">🔥 热门区域</h3>
        </div>
        <div class="bc-hot-grid" id="hotRegionGrid"></div>
      </div>

      <div class="section-header" style="margin-top:40px;">
        <h3 class="section-title">🏠 全部地方站</h3>
      </div>

      <div class="bc-filter-bar">
        <div class="bc-filter-chips" id="regionFilterChips"></div>
      </div>
      <div class="bc-filter-bar">
        <div class="bc-filter-chips" id="ecoTypeFilterChips"></div>
      </div>

      <div class="grid-4" id="stationCardsGrid"></div>
      <div class="bc-empty-state" id="emptyState" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>没有找到匹配的地方站，请尝试调整筛选条件</p>
      </div>

      <div class="bc-cta-banner">
        <h3>加入全球地方站网络</h3>
        <p>创建你的地方站，成为BirdChain全球鸟类观测网络的一员</p>
        <a href="create-station.html" class="btn btn-accent btn-lg">创建地方站</a>
      </div>
    </main>
  </div>
  <div class="bc-toast-container" id="toastContainer"></div>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/data-loader.js"></script>
  <script src="/assets/js/pricing.js"></script>
  <script src="/assets/js/interactions.js"></script>
  <script src="/assets/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      BirdChainComponents.renderHeader('stations');
      BirdChainComponents.renderFooter();
      document.getElementById('breadcrumbTarget').innerHTML = BirdChainComponents.renderBreadcrumb([
        { label: '全球地方站' }
      ]);
      BirdChainInteractions.initAll();

      var stations = [];
      try { stations = await loadData('stations'); } catch(e) { console.error(e); }

      var currentRegion = '全部';
      var currentEcoType = '全部';

      var regionData = [
        { name: '东亚', icon: '🏯', count: 0 },
        { name: '东南亚', icon: '🌴', count: 0 },
        { name: '南亚', icon: '🕌', count: 0 },
        { name: '欧洲', icon: '🏰', count: 0 },
        { name: '非洲', icon: '🦁', count: 0 },
        { name: '北美洲', icon: '🗽', count: 0 },
        { name: '南美洲', icon: '🏔️', count: 0 },
        { name: '大洋洲', icon: '🐨', count: 0 },
        { name: '全部地区', icon: '🌏', count: 0 }
      ];

      var ecoTypes = ['全部', '湿地', '雨林', '海岸', '高原', '城市', '草原', '迁徙走廊'];

      function countByRegion(region) {
        if (region === '全部地区') return stations.length;
        return stations.filter(function(s) { return s.region === region; }).length;
      }

      function updateRegionCounts() {
        regionData.forEach(function(r) {
          r.count = countByRegion(r.name);
        });
      }

      updateRegionCounts();

      function renderRegionMap() {
        var grid = document.getElementById('regionMapGrid');
        var html = '';
        regionData.forEach(function(r) {
          html += '<div class="bc-map-card' + (currentRegion === r.name ? ' active' : '') + '" data-region="' + esc(r.name) + '">';
          html += '<div class="bc-map-card-icon">' + r.icon + '</div>';
          html += '<div class="bc-map-card-name">' + esc(r.name) + '</div>';
          html += '<div class="bc-map-card-count">' + r.count + ' 个地方站</div>';
          html += '</div>';
        });
        grid.innerHTML = html;

        grid.querySelectorAll('.bc-map-card').forEach(function(card) {
          card.addEventListener('click', function() {
            var region = card.getAttribute('data-region');
            currentRegion = region;
            if (region === '全部地区') currentRegion = '全部';
            updateFilterChips();
            renderRegionMap();
            filterStations();
          });
        });
      }

      function renderStats() {
        var totalCountries = new Set(stations.map(function(s) { return s.country; })).size;
        var totalSpecies = stations.reduce(function(sum, s) { return sum + (s.speciesCount || 0); }, 0);
        var totalWorks = stations.reduce(function(sum, s) { return sum + (s.workCount || 0); }, 0);
        var totalCreators = stations.reduce(function(sum, s) { return sum + (s.creatorCount || 0); }, 0);

        document.getElementById('statsRow').innerHTML =
          '<div class="bc-stat-card"><div class="bc-stat-num">' + totalCountries + '</div><div class="bc-stat-label">覆盖国家/地区数</div></div>' +
          '<div class="bc-stat-card"><div class="bc-stat-num">' + stations.length + '</div><div class="bc-stat-label">地方站数量</div></div>' +
          '<div class="bc-stat-card"><div class="bc-stat-num">' + formatNumber(totalSpecies) + '</div><div class="bc-stat-label">观测点数</div></div>' +
          '<div class="bc-stat-card"><div class="bc-stat-num">' + formatNumber(totalWorks) + '</div><div class="bc-stat-label">物种记录数</div></div>';
      }

      function renderHotRegions() {
        var sorted = stations.slice().sort(function(a, b) { return (b.workCount || 0) - (a.workCount || 0); }).slice(0, 3);
        var grid = document.getElementById('hotRegionGrid');
        var html = '';
        sorted.forEach(function(s) {
          html += '<a href="station-detail.html?id=' + esc(s.id) + '" class="bc-hot-card">';
          html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #2a5c4a, #1a3a2a); width:100%; height:100%; object-fit:cover;" alt="' + esc(s.name) + '">';
          html += '<div class="bc-hot-card-body"><h4>' + esc(s.name) + '</h4><span>' + esc(s.region) + ' · ' + esc(s.country) + '</span></div>';
          html += '</a>';
        });
        grid.innerHTML = html;
      }

      function renderFilterChips() {
        var allRegions = ['全部', '东亚', '东南亚', '南亚', '欧洲', '非洲', '北美洲', '南美洲', '大洋洲'];
        var regionHtml = '';
        allRegions.forEach(function(r) {
          regionHtml += '<span class="bc-filter-chip' + (currentRegion === r ? ' active' : '') + '" data-region="' + esc(r) + '">' + esc(r) + '</span>';
        });
        document.getElementById('regionFilterChips').innerHTML = regionHtml;

        var ecoHtml = '';
        ecoTypes.forEach(function(t) {
          ecoHtml += '<span class="bc-filter-chip' + (currentEcoType === t ? ' active' : '') + '" data-ecotype="' + esc(t) + '">' + esc(t) + '</span>';
        });
        document.getElementById('ecoTypeFilterChips').innerHTML = ecoHtml;

        document.querySelectorAll('#regionFilterChips .bc-filter-chip').forEach(function(chip) {
          chip.addEventListener('click', function() {
            currentRegion = chip.getAttribute('data-region');
            updateFilterChips();
            filterStations();
          });
        });
        document.querySelectorAll('#ecoTypeFilterChips .bc-filter-chip').forEach(function(chip) {
          chip.addEventListener('click', function() {
            currentEcoType = chip.getAttribute('data-ecotype');
            updateFilterChips();
            filterStations();
          });
        });
      }

      function updateFilterChips() {
        document.querySelectorAll('#regionFilterChips .bc-filter-chip').forEach(function(chip) {
          chip.classList.toggle('active', chip.getAttribute('data-region') === currentRegion);
        });
        document.querySelectorAll('#ecoTypeFilterChips .bc-filter-chip').forEach(function(chip) {
          chip.classList.toggle('active', chip.getAttribute('data-ecotype') === currentEcoType);
        });
      }

      function filterStations() {
        var filtered = stations.filter(function(s) {
          var regionMatch = currentRegion === '全部' || s.region === currentRegion;
          var ecoMatch = currentEcoType === '全部' || (s.type && s.type.indexOf(currentEcoType) !== -1) || (s.ecoType && s.ecoType.indexOf(currentEcoType) !== -1);
          return regionMatch && ecoMatch;
        });

        var grid = document.getElementById('stationCardsGrid');
        var empty = document.getElementById('emptyState');

        if (filtered.length === 0) {
          grid.innerHTML = '';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          var html = '';
          filtered.forEach(function(s) {
            html += '<a href="station-detail.html?id=' + esc(s.id) + '" class="bc-station-link">';
            html += '<div class="bc-station-card">';
            html += '<div class="bc-station-card-img">';
            html += '<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="background: linear-gradient(135deg, #2a5c4a, #1a3a2a); width:100%; aspect-ratio:4/3; object-fit:cover;" alt="' + esc(s.name) + '">';
            html += '</div>';
            html += '<div class="bc-station-card-body">';
            html += '<div class="bc-station-card-title">' + esc(s.name) + '</div>';
            html += '<span class="bc-station-card-type">' + esc(s.type || '综合生态') + '</span>';
            html += '<div class="bc-station-card-region">' + LOCATION_ICON_SVG + ' ' + esc(s.country) + ' · ' + esc(s.location) + '</div>';
            html += '<div class="bc-station-card-stats-row">';
            html += '<span>🦜 ' + formatNumber(s.speciesCount || 0) + ' 鸟种</span>';
            html += '<span>📷 ' + formatNumber(s.workCount || 0) + ' 作品</span>';
            html += '<span>👥 ' + formatNumber(s.creatorCount || 0) + ' 摄影师</span>';
            html += '</div>';
            html += '</div></div></a>';
          });
          grid.innerHTML = html;
        }
      }

      renderRegionMap();
      renderStats();
      renderHotRegions();
      renderFilterChips();
      filterStations();
    });
  </script>
</body>
</html>
